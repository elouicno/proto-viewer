name: Update protos.json manifest

on:
  push:
    branches: [main]
    paths:
      - 'protos/**'

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate protos.json
        run: |
          cd protos
          ls -1 *.html *.htm 2>/dev/null | sort > /tmp/files.txt
          cd ..
          python3 -c "
          import json
          with open('/tmp/files.txt') as f:
              files = [line.strip() for line in f if line.strip()]
          with open('protos.json', 'w') as out:
              json.dump(files, out, indent=2, ensure_ascii=False)
              out.write(chr(10))
          print('Updated protos.json with', len(files), 'files:', files)
          "

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add protos.json
          git diff --cached --quiet && echo "No changes" || (git commit -m "Auto-update protos.json manifest" && git push)
