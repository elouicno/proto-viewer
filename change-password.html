<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proto Viewer — Changer le mot de passe</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --bg-card: #16171b;
    --accent: #636bff;
    --accent-soft: rgba(99,107,255,.12);
    --text: #e8e9ed;
    --text-dim: #8b8d97;
    --text-muted: #555660;
    --border: #27282e;
    --danger: #ff4d6a;
    --success: #34d399;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    max-width: 480px;
    width: 100%;
  }

  h1 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 20px;
  }

  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text-muted); }

  .btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s;
  }

  .btn:hover { opacity: .9; }
  .btn:disabled { opacity: .5; cursor: wait; }

  .result {
    display: none;
    margin-top: 24px;
    padding: 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .result.visible { display: block; }

  .result-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  .hash-box {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .hash-value {
    flex: 1;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    word-break: break-all;
    line-height: 1.6;
  }

  .copy-btn {
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all .2s;
    flex-shrink: 0;
  }

  .copy-btn:hover { background: var(--accent); color: #fff; }

  .config-preview {
    margin-top: 16px;
    padding: 12px;
    background: #1c1d22;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    white-space: pre;
  }

  .config-preview .highlight { color: var(--success); }

  .steps {
    margin-top: 20px;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.8;
  }

  .steps a {
    color: var(--accent);
    text-decoration: none;
  }

  .steps a:hover { text-decoration: underline; }

  .step-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 50%;
    font-size: 11px;
    font-weight: 700;
    margin-right: 6px;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Changer le mot de passe</h1>
  <p class="subtitle">Entrez le nouveau mot de passe. Le hash SHA-256 sera genere automatiquement pour le fichier config.json.</p>

  <label for="pw">Nouveau mot de passe</label>
  <input type="text" id="pw" placeholder="Ex: MonNouveauMotDePasse2026" autocomplete="off" autofocus>

  <button class="btn" id="generateBtn" onclick="generate()">Generer le hash</button>

  <div class="result" id="result">
    <div class="result-label">Hash SHA-256</div>
    <div class="hash-box">
      <span class="hash-value" id="hashValue"></span>
      <button class="copy-btn" onclick="copyHash()">Copier</button>
    </div>

    <div class="config-preview" id="configPreview"></div>

    <div class="steps">
      <p><span class="step-num">1</span> Copiez le hash ci-dessus</p>
      <p><span class="step-num">2</span> Ouvrez <a href="https://github.com/elouicno/proto-viewer/edit/main/config.json" target="_blank">config.json sur GitHub</a></p>
      <p><span class="step-num">3</span> Remplacez l'ancien hash par le nouveau</p>
      <p><span class="step-num">4</span> Cliquez "Commit changes"</p>
    </div>
  </div>
</div>

<script>
async function generate() {
  const pw = document.getElementById('pw').value.trim();
  if (!pw) return;

  const data = new TextEncoder().encode(pw);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

  document.getElementById('hashValue').textContent = hash;

  const preview = document.getElementById('configPreview');
  preview.innerHTML = '{\n  "passwordHash": "<span class="highlight">' + hash + '</span>"\n}';

  document.getElementById('result').classList.add('visible');
}

function copyHash() {
  const hash = document.getElementById('hashValue').textContent;
  navigator.clipboard.writeText(hash).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copie !';
    setTimeout(() => btn.textContent = 'Copier', 1500);
  });
}

document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});
</script>

</body>
</html>
