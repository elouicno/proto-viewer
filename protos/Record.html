       ═══════════════════════════════════════════════ */
    const Icon = ({ name, size = 16, color = "currentColor", strokeWidth = 2, className = "", fill = "none" }) => {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && lucide.icons[name]) {
          ref.current.innerHTML = "";
          const el = lucide.createElement(lucide.icons[name]);
          el.setAttribute("width", size);
          el.setAttribute("height", size);
          el.setAttribute("stroke", color);
          el.setAttribute("stroke-width", strokeWidth);
          if (fill !== "none") el.setAttribute("fill", fill);
          ref.current.appendChild(el);
        }
      }, [name, size, color, strokeWidth, fill]);
      return <span ref={ref} className={`inline-flex items-center justify-center shrink-0 ${className}`} style={{ width: size, height: size }} />;
    };

    /* ═══════════════════════════════════════════════
       SLDS-STYLE PATH CHEVRON (SVG) — pill-shaped, interlocking arrows, no gaps
       ═══════════════════════════════════════════════ */
    const PathStep = ({ step, index, total }) => {
      const isFirst = index === 0;
      const isLast = index === total - 1;
      const bg = step.completed ? "#acf3e4" : step.current ? "#032d60" : "#e5e5e5";
      const textColor = step.current ? "white" : "#03234d";

      /*
       * Each step is drawn inside its own SVG with overflow visible.
       * The chevron "arrow tip" extends PAST the step's right edge (overflow)
       * and the next step's left side has a matching V-notch.
       * Arrow depth = 10px. viewBox width = 100 (content) + 10 (arrow overflow) = 110 visible area.
       * Height = 32.  Rounded caps use r=16 arcs.
       */
      const D = 10; /* chevron arrow depth in viewBox units */
      const R = 16; /* rounded cap radius */
      const W = 100; /* base width */

      let shapePath;
      if (isFirst) {
        /* Rounded left cap → flat top → arrow tip right → flat bottom → back to arc */
        shapePath = `M${R},0 L${W},0 L${W+D},16 L${W},32 L${R},32 A${R},${R} 0 0,1 ${R},0 Z`;
      } else if (isLast) {
        /* V-notch left → flat top → rounded right cap → flat bottom → back to notch */
        shapePath = `M0,0 L${W-R},0 A${R},${R} 0 0,1 ${W-R},32 L0,32 L${D},16 Z`;
      } else {
        /* V-notch left → flat top → arrow tip right → flat bottom → back to notch */
        shapePath = `M0,0 L${W},0 L${W+D},16 L${W},32 L0,32 L${D},16 Z`;
      }

      return (
        <div className="relative h-[32px] flex items-center" style={{ flex: 1, minWidth: 0, marginRight: isLast ? 0 : "-5px" }}>
          <svg
            className="absolute inset-0 w-full h-full"
            viewBox={`0 0 ${isFirst || (!isFirst && !isLast) ? W + D : W} 32`}
            preserveAspectRatio="none"
            style={{ overflow: "visible" }}
          >
            <path d={shapePath} fill={bg} />
          </svg>
          <div className="relative z-10 flex items-center justify-center w-full" style={{ paddingLeft: isFirst ? 0 : D/2, paddingRight: isLast ? 0 : D/2 }}>
            {step.completed && (
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#056764" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            )}
            {step.label && <span className="text-[13px] leading-none font-medium" style={{ color: textColor }}>{step.label}</span>}
          </div>
        </div>
      );
    };

    const SvgChevRightCircle = () => (

    };

    /* ═══════════════════════════════════════════════
       ACTIVITY EMAIL ITEM
       ═══════════════════════════════════════════════ */
    const ActivityItem = ({ email, iconBg = "#939393" }) => (
      <div className="flex items-start gap-[8px] py-[12px] border-b border-[#e5e5e5] last:border-b-0">
        <div className="shrink-0 mt-[4px] cursor-pointer">
          <SvgChevRight size={14} color="#0250d9" />
        </div>
        <div className="w-[24px] h-[24px] rounded-full bg-[#939393] flex items-center justify-center shrink-0 mt-[2px]">
          <SvgMail size={13} color="white" />
        </div>
        <div className="flex-1 min-w-0">
          <p className="text-[13px] text-[#0250d9] leading-[18px] truncate cursor-pointer hover:underline font-semibold">{email.subject}</p>
          <p className="text-[12px] text-[#5c5c5c] leading-[17px]">
            <span className="text-[#0250d9] hover:underline cursor-pointer">{email.sender}</span>
            {" "}{email.action}{" "}
            <span className="text-[#0250d9] hover:underline cursor-pointer">{email.target}</span>
          </p>
        </div>
        <div className="flex items-center gap-[4px] shrink-0 text-[12px] text-[#5c5c5c]">
          <SvgUsers2 size={14} color="#747474" />
          <SvgPaperclip size={14} color="#747474" />
          <span className="whitespace-nowrap ml-[2px]">{email.time}</span>
          <div className="ml-[4px] cursor-pointer" style={{ width: 24, height: 24 }}>
            <SvgChevDownCircle size={24} />
          </div>
        </div>
      </div>
    );

    /* ═══════════════════════════════════════════════
       CENTER COLUMN
       ═══════════════════════════════════════════════ */
    const CenterColumn = () => {
      const [activityOpen, setActivityOpen] = useState(true);

      return (
        <div className="flex flex-col gap-[12px]">
          {/* ── Path + Guidance card ── */}
          <div className="bg-white rounded-[20px] p-[16px]" style={{ boxShadow: "0 0 1.49px rgba(0,0,0,0.09), 0 1.4px 1.5px rgba(0,0,0,0.09), 0 -1px 1px rgba(0,0,0,0.04)" }}>
            <SalesPath />

            {/* Status row */}
            <div className="flex items-center justify-between mb-[16px]">
              <h2 className="text-[20px] font-normal text-[#03234d]">Status: Working</h2>
              <PillButton label="Mark Stage as Complete" primary />
            </div>

            {/* Guidance for Success */}
            <div>
              <h3 className="text-[14px] font-semibold text-[#2e2e2e] mb-[8px]">Guidance for Success</h3>
              <div className="flex flex-col gap-[6px] text-[14px] text-[#2e2e2e] leading-[18px] font-normal">
                {[
                  "What problems do they want to solve and what are they hoping to improve?",
                  "Why are they looking now and where are they in the buying cycle?",
                  "What's their budget?",
                  "What other solutions are they considering?"
                ].map((q, i) => (
                  <div key={i} className="flex gap-[8px]">
                    <span className="text-[#5c5c5c] shrink-0">•</span>
                    <span>{q}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* ── Activity timeline card ── */}
          <div className="bg-white rounded-[20px] overflow-hidden" style={{ boxShadow: "0 0 1.49px rgba(0,0,0,0.09), 0 1.4px 1.5px rgba(0,0,0,0.09), 0 -1px 1px rgba(0,0,0,0.04)" }}>
            {/* Activity buttons row */}
            <div className="flex items-center gap-[8px] flex-wrap px-[16px] pt-[16px] pb-[16px]">
              <ActivitySplitButton iconName="phone" label="Log a Call" iconBg="#06a59a" />
              <ActivitySplitButton iconName="mail" label="Email" iconBg="#107cad" />
              <ActivitySplitButton iconName="calendar" label="New Event" iconBg="#ff538a" />
              {/* Task button — icon only */}
              <ActivitySplitButton iconName="check-square" iconBg="#3ba755" />
            </div>

            {/* Einstein Insights toggle */}
            <div className="flex items-center mx-[16px] px-[8px] py-[4px] gap-[8px] bg-[#f3f3f3] rounded-[8px] h-[32px] mb-[16px]">
              <SvgBrain size={16} color="#5c5c5c" />
              <span className="text-[14px] text-[#03234d] font-normal">Only show activities with insights</span>
              <div className="ml-auto">
                <ToggleSwitch />
              </div>
            </div>

            {/* Filters row */}
            <div className="px-[16px] py-[8px] text-[13px] text-[#5c5c5c] flex items-center gap-[4px] flex-wrap">
              <span className="font-normal">Filters:</span>
              <span className="text-[#2e2e2e] font-normal">All time</span>
              <span>•</span>
              <span className="text-[#2e2e2e] font-normal">All Activities</span>
              <span>•</span>
              <span className="text-[#2e2e2e] font-normal">Logged calls, Email, Events, List email, and Tasks</span>
              <button className="ml-auto"><SvgSettings size={20} color="#5c5c5c" /></button>
            </div>

            {/* Refresh / Expand / View All */}
            <div className="flex items-center justify-end gap-[8px] px-[16px] py-[8px]">
              <button className="text-[13px] text-[#0250d9] hover:underline font-normal">Refresh</button>
              <span className="text-[#c9c9c9]">•</span>
              <button className="text-[13px] text-[#0250d9] hover:underline font-normal">Expand All</button>
              <span className="text-[#c9c9c9]">•</span>
              <button className="text-[13px] text-[#0250d9] hover:underline font-normal">View All</button>
            </div>

            {/* Upcoming & Overdue section */}
            <div className="border-t border-[#c9c9c9]">
              <button
                onClick={() => setActivityOpen(!activityOpen)}
                className="flex items-center gap-[8px] w-full text-left h-[48px] px-[12px]"
              >
                <SvgChevDown2 size={16} color="#5c5c5c" />
                <span className="text-[20px] font-normal text-[#03234d] flex-1">Upcoming and Overdue</span>
                <div className="cursor-pointer" style={{ width: 28, height: 28 }}>
                  <SvgChevDownCircle size={28} />
                </div>
              </button>
              {activityOpen && (
                <div className="flex flex-col px-[12px] pb-[12px]">
                  {EMAILS.map((email, i) => (
                    <ActivityItem key={i} email={email} />
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════
       RELATED LIST CARD (right column)
       ═══════════════════════════════════════════════ */
    const RelatedListCard = ({ title, count, iconName, iconBg, children }) => (
      <div className="bg-white rounded-[20px] overflow-hidden" style={{ boxShadow: "0 0 1.49px rgba(0,0,0,0.09), 0 1.4px 1.5px rgba(0,0,0,0.09), 0 -1px 1px rgba(0,0,0,0.04)" }}>
        <div className="flex items-center justify-between px-[16px] py-[12px]">
          <div className="flex items-center gap-[8px]">
            <SLDSIcon bgColor={iconBg} iconName={iconName} size={24} iconSize={13} />
            <span className="text-[20px] font-normal text-[#03234d]">{title} ({count})</span>
          </div>
          <SmallRoundBtn icon="chevron-down" />
        </div>
        {children && <div className="px-[16px] pb-[16px] border-t border-[#e5e5e5]">{children}</div>}
      </div>
    );

    /* ═══════════════════════════════════════════════
       RIGHT COLUMN
       ═══════════════════════════════════════════════ */
    const RightColumn = () => (
      <div className="flex flex-col gap-[12px]">
        {/* Contacts */}
        <RelatedListCard title="Contacts" count={3} iconName="users" iconBg="#9602c7">
          <div className="flex flex-col gap-[20px]">
            {CONTACTS.map((c, i) => (
              <div key={i} className="flex items-start gap-[12px]">
                <ContactAvatar />
                <div className="flex-1 min-w-0">
                  <p className="text-[13px] text-[#0250d9] leading-[18px] cursor-pointer hover:underline font-normal">{c.name}</p>
                  <p className="text-[12px] text-[#5c5c5c] leading-[17px] font-normal">
                    <span className="inline-block w-[42px]">Title:</span>{c.title}
                  </p>
                  <p className="text-[12px] text-[#5c5c5c] leading-[17px] font-normal">
                    <span className="inline-block w-[42px]">Role:</span>{c.role}
                  </p>
                </div>
                <div className="shrink-0 mt-[2px] cursor-pointer" style={{ width: 28, height: 28 }}>
                  <SvgChevDownCircle size={28} />
                </div>
              </div>
            ))}
          </div>
        </RelatedListCard>

        {/* Opportunities */}
        <RelatedListCard title="Opportunities" count={0} iconName="opportunity" iconBg="#fcb95b" />

        {/* Cases */}
        <RelatedListCard title="Cases" count={0} iconName="case" iconBg="#e8726d" />

        {/* Files */}
        <RelatedListCard title="Files" count={0} iconName="file" iconBg="#54698d">
          <div className="flex items-center justify-center py-[12px]">
            <button className="flex items-center gap-[8px] h-[32px] px-[16px] rounded-full border-2 border-dashed border-[#c9c9c9] text-[14px] text-[#0250d9] bg-white hover:bg-[#f3f3f3] transition-colors font-normal">
              <SvgUpload size={14} color="#0250d9" />
              Upload Image
            </button>
          </div>
        </RelatedListCard>
      </div>
    );

    /* ═══════════════════════════════════════════════
       BOTTOM BAR (To Do List)
       ═══════════════════════════════════════════════ */
    const BottomBar = () => (
      <div className="fixed bottom-0 left-0 right-0 h-[32px] bg-white border-t border-[#c9c9c9] flex items-center px-[16px] gap-[8px] z-50">
        <SvgListTodo size={14} color="#747474" />
        <span className="text-[12px] text-[#5c5c5c] font-normal">To Do List</span>
      </div>
    );

    /* ═══════════════════════════════════════════════
       MAIN APP
       ═══════════════════════════════════════════════ */
    const App = () => (
      <div className="min-h-screen bg-[#f3f3f3] flex flex-col" style={{ fontFamily: "-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro', 'Inter', 'Segoe UI', system-ui, sans-serif" }}>
        <GlobalHeader />
        <NavBar />
        <RecordHeader />

        {/* Main 3-column layout */}
        <div className="flex-1 overflow-auto px-[24px] py-[16px] pb-[48px]">
          <div className="flex gap-[16px]">
            {/* Left column — About */}
            <div className="w-[360px] shrink-0">
              <AboutSection />
            </div>
            {/* Center column — Path + Activity */}
            <div className="flex-1 min-w-0">
              <CenterColumn />
            </div>
            {/* Right column — Related Lists */}
            <div className="w-[360px] shrink-0">
              <RightColumn />
            </div>
          </div>
        </div>

        <BottomBar />
      </div>
    );

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
