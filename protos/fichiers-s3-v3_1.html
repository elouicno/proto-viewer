<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fichiers S3</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f7f9;
    --surface: #ffffff;
    --surface-hover: #f9fafb;
    --border: #e8eaef;
    --border-light: #f0f1f4;
    --text-primary: #111827;
    --text-secondary: #6b7280;
    --text-tertiary: #9ca3af;
    --accent: #2563eb;
    --accent-light: #eff4ff;
    --accent-hover: #1d4ed8;
    --danger: #ef4444;
    --danger-light: #fef2f2;
    --danger-hover: #dc2626;
    --success: #16a34a;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
    --radius: 8px;
    --radius-lg: 12px;
    --transition: 180ms ease;
    --topbar-height: 64px;
    --toolbar-height: 52px;
    --c-pdf: #dc2626; --c-doc: #2563eb; --c-xls: #16a34a; --c-ppt: #e04e2a;
    --c-img: #f59e0b; --c-vid: #8b5cf6; --c-audio: #3b82f6; --c-csv: #059669; --c-zip: #6b7280;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text-primary); font-size:14px; line-height:1.5; height:100vh; overflow:hidden; }

  /* ── TOPBAR ── */
  .topbar { height:var(--topbar-height); background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 24px; gap:16px; position:fixed; top:0; left:0; right:0; z-index:100; }
  .topbar-brand { display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .topbar-brand-icon { width:34px; height:34px; background:linear-gradient(135deg,#2563eb,#7c3aed); border-radius:9px; display:flex; align-items:center; justify-content:center; }
  .topbar-brand-icon svg { width:18px; height:18px; color:#fff; }
  .topbar-brand-text { font-size:17px; font-weight:700; color:var(--text-primary); letter-spacing:-0.3px; }
  .topbar-brand-text span { font-weight:500; color:var(--text-secondary); margin-left:2px; }
  .search-wrapper { flex:1; max-width:560px; position:relative; }
  .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); width:18px; height:18px; color:var(--text-tertiary); pointer-events:none; transition:color var(--transition); }
  .search-input { width:100%; height:40px; border:1.5px solid var(--border); border-radius:10px; padding:0 14px 0 42px; font-family:inherit; font-size:14px; color:var(--text-primary); background:var(--bg); outline:none; transition:all var(--transition); }
  .search-input::placeholder { color:var(--text-tertiary); }
  .search-input:focus { border-color:var(--accent); background:var(--surface); box-shadow:0 0 0 3px rgba(37,99,235,0.1); }
  .search-input:focus ~ .search-icon { color:var(--accent); }
  .topbar-actions { display:flex; align-items:center; gap:8px; flex-shrink:0; }

  .btn { display:inline-flex; align-items:center; gap:7px; padding:0 16px; height:38px; border-radius:var(--radius); font-family:inherit; font-size:13.5px; font-weight:600; cursor:pointer; border:none; transition:all var(--transition); white-space:nowrap; }
  .btn svg { width:16px; height:16px; flex-shrink:0; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:var(--accent-hover); transform:translateY(-1px); box-shadow:var(--shadow-md); }
  .btn-ghost { background:transparent; color:var(--text-secondary); border:1.5px solid var(--border); }
  .btn-ghost:hover { background:var(--surface-hover); border-color:#d1d5db; color:var(--text-primary); }
  .btn-danger { background:var(--danger); color:#fff; }
  .btn-danger:hover { background:var(--danger-hover); }

  /* ── MAIN ── */
  .main-layout { margin-top:var(--topbar-height); height:calc(100vh - var(--topbar-height)); display:flex; }
  .file-panel { flex:1; display:flex; flex-direction:column; min-width:0; }

  /* ── TOOLBAR ── */
  .toolbar { height:var(--toolbar-height); padding:0 24px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; overflow:visible; position:relative; z-index:20; }
  .toolbar::-webkit-scrollbar { height:0; }
  .filter-group { display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .filter-label { font-size:11.5px; font-weight:600; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.5px; margin-right:4px; white-space:nowrap; }

  /* Custom dropdown */
  .dropdown-wrapper { position:relative; }
  .dropdown-trigger { height:32px; padding:0 10px 0 12px; border-radius:7px; font-family:inherit; font-size:13px; font-weight:500; border:1.5px solid var(--border); background:var(--surface); color:var(--text-secondary); cursor:pointer; transition:all var(--transition); display:inline-flex; align-items:center; gap:8px; white-space:nowrap; user-select:none; }
  .dropdown-trigger:hover { border-color:#c7cad0; background:var(--surface-hover); }
  .dropdown-trigger.active { border-color:var(--accent); background:var(--accent-light); color:var(--accent); }
  .dropdown-trigger.open { border-color:var(--accent); box-shadow:0 0 0 3px rgba(37,99,235,0.08); }
  .dropdown-trigger .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .dropdown-trigger .chevron { width:14px; height:14px; transition:transform 200ms ease; flex-shrink:0; }
  .dropdown-trigger.open .chevron { transform:rotate(180deg); }
  .dropdown-menu { position:absolute; top:calc(100% + 6px); left:0; min-width:200px; background:var(--surface); border:1.5px solid var(--border); border-radius:10px; box-shadow:var(--shadow-lg); z-index:999; padding:6px; opacity:0; visibility:hidden; transform:translateY(-6px); transition:all 180ms ease; }
  .dropdown-menu.open { opacity:1; visibility:visible; transform:translateY(0); }
  .dropdown-item { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:7px; cursor:pointer; font-size:13px; font-weight:500; color:var(--text-secondary); transition:all 120ms ease; border:none; background:none; width:100%; text-align:left; font-family:inherit; }
  .dropdown-item:hover { background:var(--surface-hover); color:var(--text-primary); }
  .dropdown-item.selected { background:var(--accent-light); color:var(--accent); }
  .dropdown-item .item-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .dropdown-item .item-check { width:16px; height:16px; flex-shrink:0; opacity:0; color:var(--accent); margin-left:auto; }
  .dropdown-item.selected .item-check { opacity:1; }
  .filter-separator { width:1px; height:24px; background:var(--border); margin:0 6px; flex-shrink:0; }
  .date-filter { display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .date-input { height:30px; padding:0 10px; border:1.5px solid var(--border); border-radius:7px; font-family:inherit; font-size:12.5px; color:var(--text-secondary); background:var(--surface); outline:none; width:140px; transition:border-color var(--transition); }
  .date-input:focus { border-color:var(--accent); }
  .toolbar-spacer { flex:1; }
  .file-count { font-size:12.5px; color:var(--text-tertiary); font-weight:500; white-space:nowrap; }
  .view-toggle { display:flex; border:1.5px solid var(--border); border-radius:7px; overflow:hidden; flex-shrink:0; }
  .view-toggle-btn { width:32px; height:28px; display:flex; align-items:center; justify-content:center; background:var(--surface); border:none; cursor:pointer; color:var(--text-tertiary); transition:all var(--transition); }
  .view-toggle-btn:first-child { border-right:1.5px solid var(--border); }
  .view-toggle-btn.active { background:var(--accent-light); color:var(--accent); }
  .view-toggle-btn:hover:not(.active) { background:var(--surface-hover); }
  .view-toggle-btn svg { width:14px; height:14px; }

  /* ── FILE LIST ── */
  .file-list-container { flex:1; overflow-y:auto; overflow-x:hidden; }
  .file-list-container::-webkit-scrollbar { width:6px; }
  .file-list-container::-webkit-scrollbar-track { background:transparent; }
  .file-list-container::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:3px; }

  .file-list-header { display:grid; grid-template-columns:44px 1fr 100px 130px 110px; align-items:center; padding:0 24px; height:38px; border-bottom:1px solid var(--border); background:var(--bg); position:sticky; top:0; z-index:5; }
  .file-list-header span { font-size:11.5px; font-weight:600; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.5px; }
  .file-list-header.hidden { display:none; }

  .file-row { display:grid; grid-template-columns:44px 1fr 100px 130px 110px; align-items:center; padding:0 24px; height:52px; border-bottom:1px solid var(--border-light); cursor:pointer; transition:background var(--transition); position:relative; animation:fadeInUp 300ms ease both; }
  .file-row:hover { background:var(--surface-hover); }
  .file-row.selected { background:var(--accent-light); }
  .file-row.selected::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--accent); border-radius:0 3px 3px 0; }
  .file-row.deleting { animation:fadeOutRight 350ms ease forwards; }

  .file-icon-cell { display:flex; align-items:center; justify-content:center; }
  .file-icon { width:32px; height:32px; border-radius:7px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .file-icon svg { width:16px; height:16px; color:#fff; }
  .file-icon.pptx { background:var(--c-ppt); } .file-icon.mp3 { background:var(--c-audio); }
  .file-icon.xlsx { background:var(--c-xls); } .file-icon.mov { background:var(--c-vid); }
  .file-icon.docx { background:var(--c-doc); } .file-icon.csv { background:var(--c-csv); }
  .file-icon.zip { background:var(--c-zip); } .file-icon.png { background:var(--c-img); }
  .file-icon.pdf { background:var(--c-pdf); }

  .file-name-cell { min-width:0; padding-right:16px; }
  .file-name { font-size:13.5px; font-weight:500; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block; }
  .file-row:hover .file-name { color:var(--accent); }
  .file-size-cell, .file-date-cell { font-size:13px; color:var(--text-secondary); }
  .file-date-cell { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-tertiary); }
  .file-actions-cell { display:flex; align-items:center; justify-content:flex-end; gap:4px; opacity:0; transition:opacity var(--transition); }
  .file-row:hover .file-actions-cell { opacity:1; }

  .icon-btn { width:30px; height:30px; border-radius:7px; border:none; background:transparent; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-tertiary); transition:all var(--transition); }
  .icon-btn:hover { background:var(--border-light); color:var(--text-primary); }
  .icon-btn.danger:hover { background:var(--danger-light); color:var(--danger); }
  .icon-btn svg { width:15px; height:15px; }

  /* ── GRID VIEW ── */
  .file-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(190px, 1fr)); gap:16px; padding:20px 24px; }
  .file-grid-card { background:var(--surface); border:1.5px solid var(--border-light); border-radius:var(--radius-lg); cursor:pointer; transition:all var(--transition); overflow:hidden; position:relative; animation:fadeInUp 300ms ease both; }
  .file-grid-card:hover { border-color:var(--border); box-shadow:var(--shadow-md); transform:translateY(-2px); }
  .file-grid-card.selected { border-color:var(--accent); box-shadow:0 0 0 2px rgba(37,99,235,0.15); }
  .file-grid-card.deleting { animation:fadeOutScale 350ms ease forwards; }

  .grid-card-preview { height:110px; background:var(--bg); display:flex; align-items:center; justify-content:center; position:relative; }
  .grid-card-preview .file-icon { width:44px; height:44px; border-radius:10px; }
  .grid-card-preview .file-icon svg { width:20px; height:20px; }

  .grid-card-actions { position:absolute; top:8px; right:8px; display:flex; gap:4px; opacity:0; transition:opacity var(--transition); }
  .file-grid-card:hover .grid-card-actions { opacity:1; }
  .grid-card-actions .icon-btn { background:var(--surface); box-shadow:var(--shadow-sm); border:1px solid var(--border-light); width:28px; height:28px; }

  .grid-card-info { padding:12px 14px; }
  .grid-card-name { font-size:13px; font-weight:600; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; }
  .grid-card-meta { font-size:11.5px; color:var(--text-tertiary); display:flex; gap:8px; }

  .grid-card-type-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:1px; }

  /* ── PREVIEW PANEL ── */
  .preview-panel { width:0; border-left:1px solid var(--border); background:var(--surface); display:flex; flex-direction:column; overflow:hidden; transition:width 300ms cubic-bezier(0.4,0,0.2,1); flex-shrink:0; }
  .preview-panel.open { width:50%; }
  .preview-header { height:56px; padding:0 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); flex-shrink:0; }
  .preview-header-left { display:flex; align-items:center; gap:12px; min-width:0; }
  .preview-title { font-size:14px; font-weight:600; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .preview-close { width:32px; height:32px; border-radius:7px; border:none; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-tertiary); transition:all var(--transition); flex-shrink:0; }
  .preview-close:hover { background:var(--bg); color:var(--text-primary); }
  .preview-close svg { width:18px; height:18px; }
  .preview-body { flex:1; overflow-y:auto; padding:24px; }
  .preview-body::-webkit-scrollbar { width:5px; }
  .preview-body::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:3px; }

  .preview-file-icon-area { width:100%; height:180px; background:var(--bg); border-radius:var(--radius-lg); border:1px solid var(--border-light); display:flex; align-items:center; justify-content:center; margin-bottom:24px; }
  .big-icon { width:64px; height:64px; border-radius:14px; display:flex; align-items:center; justify-content:center; }
  .big-icon svg { width:28px; height:28px; color:#fff; }

  .preview-filename { font-size:17px; font-weight:700; color:var(--text-primary); margin-bottom:8px; word-break:break-word; line-height:1.35; }
  .type-badge { display:inline-flex; align-items:center; padding:4px 10px; border-radius:6px; font-size:11.5px; font-weight:600; text-transform:uppercase; letter-spacing:0.3px; }
  .type-badge.pdf { background:#fef2f2; color:var(--c-pdf); }
  .type-badge.doc { background:#eff6ff; color:var(--c-doc); }
  .type-badge.xls { background:#f0fdf4; color:var(--c-xls); }
  .type-badge.ppt { background:#fff7ed; color:var(--c-ppt); }
  .type-badge.img { background:#fffbeb; color:var(--c-img); }
  .type-badge.vid { background:#f5f3ff; color:var(--c-vid); }
  .type-badge.audio { background:#eff6ff; color:var(--c-audio); }
  .type-badge.csv { background:#ecfdf5; color:var(--c-csv); }
  .type-badge.zip { background:#f3f4f6; color:var(--c-zip); }

  .preview-meta { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:20px; }
  .meta-card { padding:14px 16px; background:var(--bg); border-radius:var(--radius); border:1px solid var(--border-light); }
  .meta-label { font-size:11px; font-weight:600; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
  .meta-value { font-size:14px; font-weight:600; color:var(--text-primary); }

  .preview-actions { padding:16px 20px; border-top:1px solid var(--border); display:flex; gap:8px; flex-shrink:0; }
  .preview-actions .btn { flex:1; justify-content:center; height:40px; }

  /* ── DROP OVERLAY ── */
  .drop-overlay { position:fixed; inset:0; background:rgba(37,99,235,0.06); backdrop-filter:blur(2px); z-index:200; display:none; align-items:center; justify-content:center; }
  .drop-overlay.active { display:flex; }
  .drop-zone-card { background:var(--surface); border:2.5px dashed var(--accent); border-radius:20px; padding:60px 80px; text-align:center; box-shadow:var(--shadow-lg); animation:dropPulse 1.5s ease infinite; pointer-events:none; }
  .drop-zone-card svg { width:48px; height:48px; color:var(--accent); margin-bottom:16px; }
  .drop-zone-title { font-size:20px; font-weight:700; color:var(--text-primary); margin-bottom:6px; }
  .drop-zone-sub { font-size:14px; color:var(--text-secondary); }

  /* ── TOAST ── */
  .toast-container { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:300; display:flex; flex-direction:column; align-items:center; gap:8px; }
  .toast { padding:12px 20px; background:var(--text-primary); color:#fff; border-radius:10px; font-size:13.5px; font-weight:500; box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:10px; animation:toastIn 350ms ease both; white-space:nowrap; }
  .toast.removing { animation:toastOut 300ms ease forwards; }
  .toast svg { width:18px; height:18px; flex-shrink:0; }
  .toast-undo { background:none; border:none; color:var(--accent-light); font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; text-decoration:underline; margin-left:4px; }

  /* ── DELETE MODAL ── */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.35); backdrop-filter:blur(3px); z-index:250; display:none; align-items:center; justify-content:center; }
  .modal-overlay.active { display:flex; }
  .modal { background:var(--surface); border-radius:var(--radius-lg); padding:28px; width:400px; max-width:90vw; box-shadow:var(--shadow-lg); animation:modalIn 250ms ease; }
  .modal-title { font-size:17px; font-weight:700; color:var(--text-primary); margin-bottom:8px; }
  .modal-text { font-size:14px; color:var(--text-secondary); margin-bottom:24px; line-height:1.6; }
  .modal-text strong { color:var(--text-primary); font-weight:600; }
  .modal-actions { display:flex; gap:10px; justify-content:flex-end; }
  .modal-actions .btn { min-width:100px; justify-content:center; }

  /* ── EMPTY STATE ── */
  .empty-state { display:none; flex-direction:column; align-items:center; justify-content:center; padding:80px 40px; text-align:center; }
  .empty-state svg { width:64px; height:64px; color:var(--border); margin-bottom:20px; }
  .empty-state h3 { font-size:16px; font-weight:600; color:var(--text-secondary); margin-bottom:6px; }
  .empty-state p { font-size:13px; color:var(--text-tertiary); }

  /* ── ANIMATIONS ── */
  @keyframes fadeInUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeOutRight { to { opacity:0; transform:translateX(40px); height:0; padding:0; margin:0; overflow:hidden; } }
  @keyframes fadeOutScale { to { opacity:0; transform:scale(0.85); } }
  @keyframes dropPulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.01); } }
  @keyframes toastIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes toastOut { to { opacity:0; transform:translateY(16px); } }
  @keyframes modalIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
  @keyframes slideIn { from { opacity:0; transform:translateX(24px); } to { opacity:1; transform:translateX(0); } }
  .preview-panel.open .preview-header { animation:slideIn 300ms ease both; }
  .preview-panel.open .preview-body { animation:slideIn 300ms ease both 60ms; }
  .preview-panel.open .preview-actions { animation:slideIn 300ms ease both 120ms; }
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-brand">
    <div class="topbar-brand-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg></div>
    <div class="topbar-brand-text">Fichiers <span>S3</span></div>
  </div>
  <div class="search-wrapper">
    <svg class="search-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
    <input type="text" class="search-input" id="searchInput" placeholder="Rechercher par nom, contenu, type...">
  </div>
  <div class="topbar-actions">
    <label class="btn btn-primary" for="fileUpload" style="cursor:pointer"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>Importer</label>
    <input type="file" id="fileUpload" multiple hidden>
  </div>
</header>

<!-- DROP OVERLAY -->
<div class="drop-overlay" id="dropOverlay">
  <div class="drop-zone-card">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
    <div class="drop-zone-title">Déposez vos fichiers ici</div>
    <div class="drop-zone-sub">Tous formats — Aucune limite de taille</div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal-title">Supprimer ce fichier ?</div>

    renderGridView(filtered);

  pendingDeleteFile = null;

  // Animate out
  const el = document.querySelector(`[data-id="${file.id}"]`);
  if (el) {
    el.classList.add('deleting');
    el.addEventListener('animationend', () => {
      performDelete(file);
    }, { once: true });
  } else {
    performDelete(file);
  }
});

function performDelete(file) {
  const deletedFile = { ...file };
  const idx = FILES.findIndex(f => f.id === file.id);
  FILES = FILES.filter(f => f.id !== file.id);

  if (selectedFile && selectedFile.id === file.id) closePreview();
  render();

  showToast(`"${deletedFile.name}" supprimé`, 'delete', () => {
    // Undo
    FILES.splice(idx, 0, deletedFile);
    render();
    showToast(`"${deletedFile.name}" restauré`, 'undo');
  });
}

// ── TOAST ──
function showToast(msg, type, undoCallback) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  let icon = '';
  if (type === 'delete') icon = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79"/></svg>`;
  else if (type === 'download') icon = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>`;
  else if (type === 'undo') icon = `<svg fill="none" viewBox="0 0 24 24" stroke="#16a34a" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`;
  else if (type === 'upload') icon = `<svg fill="none" viewBox="0 0 24 24" stroke="#16a34a" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>`;

  toast.innerHTML = icon + `<span>${msg}</span>` + (undoCallback ? `<button class="toast-undo">Annuler</button>` : '');

  if (undoCallback) {
    toast.querySelector('.toast-undo').addEventListener('click', () => {
      undoCallback();
      removeToast(toast);
    });
  }

  toastContainer.appendChild(toast);
  setTimeout(() => removeToast(toast), undoCallback ? 6000 : 3000);
}

function removeToast(t) {
  if (!t.parentNode) return;
  t.classList.add('removing');
  t.addEventListener('animationend', () => t.remove(), { once: true });
}

// ── DROPDOWN FILTER ──
const typeTrigger = document.getElementById('typeTrigger');
const typeMenu = document.getElementById('typeMenu');
const typeLabel = document.getElementById('typeLabel');
const typeColorDots = { all:'#9ca3af', pdf:'var(--c-pdf)', docx:'var(--c-doc)', xlsx:'var(--c-xls)', pptx:'var(--c-ppt)', png:'var(--c-img)', mov:'var(--c-vid)', mp3:'var(--c-audio)', csv:'var(--c-csv)', zip:'var(--c-zip)' };
const typeNames = { all:'Tous les types', pdf:'PDF', docx:'Word', xlsx:'Excel', pptx:'PowerPoint', png:'Image', mov:'Vidéo', mp3:'Audio', csv:'CSV', zip:'ZIP' };

function toggleDropdown() {
  const isOpen = typeMenu.classList.contains('open');
  if (isOpen) { closeDropdown(); } else { typeMenu.classList.add('open'); typeTrigger.classList.add('open'); }
}

function closeDropdown() { typeMenu.classList.remove('open'); typeTrigger.classList.remove('open'); }

typeTrigger.addEventListener('click', (e) => { e.stopPropagation(); toggleDropdown(); });

document.addEventListener('click', (e) => { if (!e.target.closest('#typeDropdown')) closeDropdown(); });

document.querySelectorAll('.dropdown-item').forEach(item => {
  item.addEventListener('click', () => {
    const val = item.dataset.filter;
    activeFilter = val;
    document.querySelectorAll('.dropdown-item').forEach(i => i.classList.remove('selected'));
    item.classList.add('selected');
    typeLabel.textContent = typeNames[val];
    // Update trigger dot
    const existingDot = typeTrigger.querySelector('.dot');
    if (existingDot) existingDot.remove();
    if (val !== 'all') {
      const dot = document.createElement('span');
      dot.className = 'dot';
      dot.style.background = typeColorDots[val];
      typeTrigger.insertBefore(dot, typeTrigger.firstChild);
      typeTrigger.classList.add('active');
    } else {
      typeTrigger.classList.remove('active');
    }
    closeDropdown();
    render();
  });
});

searchInput.addEventListener('input', render);
dateFilter.addEventListener('change', render);

// ── VIEW TOGGLE ──
viewListBtn.addEventListener('click', () => {
  viewMode = 'list';
  viewListBtn.classList.add('active');
  viewGridBtn.classList.remove('active');
  render();
});

viewGridBtn.addEventListener('click', () => {
  viewMode = 'grid';
  viewGridBtn.classList.add('active');
  viewListBtn.classList.remove('active');
  render();
});

// ── DRAG & DROP ──
let dragCounter = 0;
document.addEventListener('dragenter', e => { e.preventDefault(); dragCounter++; dropOverlay.classList.add('active'); });
document.addEventListener('dragleave', e => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dropOverlay.classList.remove('active'); dragCounter = 0; }});
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault(); dragCounter = 0; dropOverlay.classList.remove('active');
  const dt = e.dataTransfer;
  if (dt.files && dt.files.length > 0) addUploadedFiles(dt.files);
});

// ── FILE UPLOAD ──
fileUpload.addEventListener('change', e => {
  if (e.target.files.length > 0) addUploadedFiles(e.target.files);
  e.target.value = '';
});

function addUploadedFiles(filesList) {
  const now = new Date();
  const dateStr = now.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric' });
  const isoStr = now.toISOString().slice(0,10);
  let count = 0;
  for (const file of filesList) {
    const ext = file.name.split('.').pop().toLowerCase();
    const typeMap = { pdf:'pdf', doc:'docx', docx:'docx', xls:'xlsx', xlsx:'xlsx', ppt:'pptx', pptx:'pptx', png:'png', jpg:'png', jpeg:'png', gif:'png', webp:'png', mp4:'mov', mov:'mov', avi:'mov', mp3:'mp3', wav:'mp3', csv:'csv', zip:'zip', rar:'zip', '7z':'zip' };
    const labelMap = { pdf:'pdf', docx:'doc', xlsx:'xls', pptx:'ppt', png:'img', mov:'vid', mp3:'audio', csv:'csv', zip:'zip' };
    const type = typeMap[ext] || 'zip';
    function formatSize(b) { if (b < 1024) return b + ' B'; if (b < 1048576) return (b/1024).toFixed(1) + ' KB'; if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB'; return (b/1073741824).toFixed(2) + ' GB'; }
    FILES.unshift({ id: Date.now() + Math.random(), name: file.name, size: formatSize(file.size), bytes: file.size, type, typeLabel: labelMap[type] || 'zip', date: dateStr, dateISO: isoStr });
    count++;
  }
  render();
  showToast(count + ' fichier' + (count > 1 ? 's' : '') + ' importé' + (count > 1 ? 's' : ''), 'upload');
}

// ── INIT ──
render();
</script>
</body>
