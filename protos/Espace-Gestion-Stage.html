// buildRecordData — génère toutes les données d'une fiche
// à partir d'une ligne de STAGIAIRES_LIST
// ══════════════════════════════════════════════════════════════

function buildRecordData(row) {
  const crCode = CR_CODE_MAP[row.cr] || "14";
  const supra = row.numInscription.replace(/-/g, " ");
  const employeurs = EMPLOYEURS_MAP[row.cr] || ["CABINET INCONNU"];
  const maitres = MAITRES_STAGE_MAP[row.cr] || ["M INCONNU"];
  const employeur = employeurs[Math.abs(hashStr(row.stagiaire)) % employeurs.length];
  const ms = maitres[0];
  const msCAC = maitres.length > 1 ? maitres[1] : maitres[0];
  const controleur = maitres.length > 2 ? maitres[2] : maitres[maitres.length - 1];
  const cp = CP_MAP[row.cr] || "75000";
  const annee = parseInt(row.anneeStage) || 1;
  const moisValides = row.statut === "Stage terminé" ? 36 : annee === 3 ? 30 : annee === 2 ? 18 : 8;
  const statutUpper = row.statut === "En exercice" ? "EN EXERCICE" : row.statut === "Stage terminé" ? "STAGE TERMINÉ" : "SUSPENDU";
  const cursusLabel = row.cursusFormation === "2" ? "TRAVAUX 200 HEURES" : "TRAVAUX 200 HEURES";

  // Compute session date (2 months after dateEffet)
  const parts = row.dateEffet.split("/");
  const mEff = parseInt(parts[1]);
  const yEff = parseInt(parts[2]);
  const sessionMonth = mEff + 2 > 12 ? mEff + 2 - 12 : mEff + 2;
  const sessionYear = mEff + 2 > 12 ? yEff + 1 : yEff;
  const sessionDate = `18/${String(sessionMonth).padStart(2,"0")}/${sessionYear}`;

  // ro = readOnly shorthand
  const ro = true;
  const nameParts = row.stagiaire.split(" ");
  const nom = nameParts[0] || "";
  const prenom = nameParts.slice(1).join(" ") || "";

  const anneeLabel = annee === 1 ? "1 an" : annee === 2 ? "2 ans" : "3 ans";
  const highlights = [
    { label: "Stagiaire", value: row.stagiaire, isLink: true },
    { label: "N° Supra", value: supra },
    { label: "Qualité", value: "STAGIAIRE - REGIME 81" },
    { label: "Statut", value: statutUpper },
    { label: "Employeur", value: employeur },
    { label: "Maître de stage", value: ms },
    { label: "Année de stage", value: anneeLabel },
    { label: "Mobile", value: `06 ${String(hashStr(row.stagiaire) % 100).padStart(2,"0")} ${String(hashStr(nom) % 100).padStart(2,"0")} ${String(hashStr(prenom) % 100).padStart(2,"0")} ${String(hashStr(supra) % 100).padStart(2,"0")}` },
    { label: "Mail", value: `${prenom.toLowerCase()}.${nom.toLowerCase()}@gmail.com` },
  ];

  // ═══ ONGLET INDIVIDU ═══

  // Identité (01 Individu - IDENTITE) — 13 éditables, 4 lecture seule
  const identite = [
    [{ label: "Qualité", value: "STAGIAIRE - REGIME 81", readOnly: ro }, { label: "Date inscription", value: row.dateEffet, readOnly: ro }],
    [{ label: "Titre", value: prenom.endsWith("e") || prenom.endsWith("a") ? "MADAME" : "MONSIEUR" }, { label: "Nom d'usage", value: nom }],
    [{ label: "Prénom", value: prenom }, { label: "Nom marital", value: "" }],
    [{ label: "Nom de famille", value: nom }, { label: "Pays de naissance", value: "FRANCE" }],
    [{ label: "Date de naissance", value: `${String(11 + (hashStr(row.stagiaire) % 20)).padStart(2,"0")}/${String(1 + (hashStr(nom) % 12)).padStart(2,"0")}/${1975 + (hashStr(prenom) % 25)}` }, { label: "Département de naissance", value: `0${crCode} ${row.cr.toUpperCase().substring(0,12)}` }],
    [{ label: "Date décès", value: "" }, { label: "Ville de naissance", value: row.cr.toUpperCase().split("-")[0] }],
    [{ label: "DESCF/DSCG complet", value: row.dscg || "Non" }, { label: "Nationalité", value: "FRANCE" }],
    [{ label: "Parution Annuaire OEC", value: "Oui" }, { label: "N° Supra", value: supra, readOnly: ro }],
    [{ label: "Identifiant", value: "" }],
  ];

  // Dossier (01 Individu - DOSSIER) — 6 éditables, 8 lecture seule
  const dossier = [
    [{ label: "Adresse pro.", value: `${row.numInscription} ${employeur}`, readOnly: ro }, { label: "N° Inscription (CR)", value: crCode }],
    [{ label: "N° Inscription (N°)", value: row.numInscription.split("-")[1] || "00000000" }, { label: "N° Inscription (index)", value: "01" }],
    [{ label: "Type d'inscription", value: "PRINCIPAL", readOnly: ro }, { label: "Statut", value: statutUpper, readOnly: ro }],
    [{ label: "Conseil Régional", value: row.cr.toUpperCase(), readOnly: ro }, { label: "Diffusion adresse", value: "Oui" }],
    [{ label: "Adresse Ordinale", value: "Adresse personnelle" }, { label: "Téléphone", value: "FRA" }],
    [{ label: "E-mail", value: `${prenom.toLowerCase()}.${nom.toLowerCase()}@gmail.com` }, { label: "Mobile", value: `FRA 06 ${String(hashStr(row.stagiaire) % 100).padStart(2,"0")} ${String(hashStr(nom) % 100).padStart(2,"0")} ${String(hashStr(prenom) % 100).padStart(2,"0")} ${String(hashStr(supra) % 100).padStart(2,"0")}` }],
  ];

  // Adresses (02 Adresses)
  const adresses = [
    [{ label: "Adresse personnelle", value: `${1 + (hashStr(row.stagiaire) % 50)} RUE ${["RONSARD","VOLTAIRE","HUGO","PASTEUR","CURIE"][hashStr(nom) % 5]}`, readOnly: ro }, { label: "Code postal", value: cp, readOnly: ro }],
    [{ label: "Ville", value: row.cr.toUpperCase().split("-")[0], readOnly: ro }, { label: "Pays", value: "FRANCE", readOnly: ro }],
    [{ label: "Mobile", value: `06 ${String(hashStr(row.stagiaire) % 100).padStart(2,"0")} ${String(hashStr(nom) % 100).padStart(2,"0")} ${String(hashStr(prenom) % 100).padStart(2,"0")} ${String(hashStr(supra) % 100).padStart(2,"0")}` }, { label: "E-mail", value: `${prenom.toLowerCase()}.${nom.toLowerCase()}@gmail.com` }],
    [{ label: "Adresse professionnelle", value: `${employeur} — ${cp}`, readOnly: ro }, { label: "Tél. professionnel", value: `01 ${String(hashStr(employeur) % 100).padStart(2,"0")} ${String(hashStr(cp) % 100).padStart(2,"0")} ${String(hashStr(ms) % 100).padStart(2,"0")} 00`, readOnly: ro }],
  ];

  // Diplômes (03 Diplomes — tableau lecture seule + détail éditable)
  const diplomes = [
    [{ label: "Code", value: "312", readOnly: ro }, { label: "Diplôme", value: row.dscg === "Complet" ? "DSCG" : "DSCG sauf UE 1", readOnly: ro }],
    [{ label: "Année", value: String(yEff - 1), readOnly: ro }, { label: "Justificatifs", value: "Oui", readOnly: ro }],
    [{ label: "Date diplôme", value: "", readOnly: ro }, { label: "Titre du mémoire", value: "", readOnly: ro }],
  ];

  // Diplômes tab — table rows + formulaire détail
  const diplomesTab = [
    { code: "312", diplome: row.dscg === "Complet" ? "DSCG" : "DSCG sauf UE 1", annee: String(yEff - 1), justificatifs: "Oui", dateDiplome: "", titrememoire: "" },
    { code: "313", diplome: "DGC INTEC", annee: String(yEff - 3), justificatifs: "Oui", dateDiplome: `15/09/${yEff - 3}`, titrememoire: "" },
    { code: "314", diplome: "Master CCA", annee: String(yEff - 2), justificatifs: "Oui", dateDiplome: `30/06/${yEff - 2}`, titrememoire: "" },
  ];
  if (annee >= 3) {
    diplomesTab.push({ code: "342", diplome: "DEC (mémoire soutenu)", annee: "", justificatifs: "Non", dateDiplome: "", titrememoire: "" });
  }

  // Mode d'exercice (04 — tableau lecture seule)
  const modeExercice = [
    [{ label: "Année", value: String(yEff), readOnly: ro }, { label: "N° d'inscription", value: row.numInscription, readOnly: ro }],
    [{ label: "Type", value: "Dossier", readOnly: ro }, { label: "CAC sous BNC", value: "", readOnly: ro }],
    [{ label: "EC sous BNC", value: "", readOnly: ro }, { label: "Expertise Judiciaire", value: "Non", readOnly: ro }],
    [{ label: "Activité chez Personne Morale", value: "", readOnly: ro }],
  ];

  // ═══ ONGLET MOTIFS ═══

  const crShort = row.cr.substring(0,3).toUpperCase();
  const reinscrMonth = mEff + 14 > 12 ? ((mEff + 14 - 1) % 12) + 1 : mEff + 14;
  const reinscrYear = mEff + 14 > 12 ? yEff + Math.floor((mEff + 13) / 12) : yEff;
  const reinscrDate = `01/${String(reinscrMonth).padStart(2,"0")}/${reinscrYear}`;
  const reinscrSessionDate = `18/${String(reinscrMonth + 2 > 12 ? reinscrMonth - 10 : reinscrMonth + 2).padStart(2,"0")}/${reinscrMonth + 2 > 12 ? reinscrYear + 1 : reinscrYear}`;

  const motifsHistorique = [
    { cr: crShort, crOrigine: crShort, numInscription: row.numInscription, motif: "INSCRIPTION AU STAGE", type: "D", effet: row.dateEffet, session: sessionDate, decision: "Validé" },
  ];
  // Add REINSCRIPTION for année 2+
  if (annee >= 2) {
    motifsHistorique.push({ cr: crShort, crOrigine: crShort, numInscription: row.numInscription, motif: "REINSCRIPTION", type: "D", effet: reinscrDate, session: reinscrSessionDate, decision: "Validé" });
  }
  // Add SUSPENSION + REPRISE for suspended
  if (row.statut === "Suspendu") {
    const suspDate = `01/${String(mEff + 6 > 12 ? mEff - 6 : mEff + 6).padStart(2,"0")}/${mEff + 6 > 12 ? yEff + 1 : yEff}`;
    motifsHistorique.push({ cr: crShort, crOrigine: crShort, numInscription: row.numInscription, motif: "SUSPENSION", type: "D", effet: suspDate, session: "", decision: "Validé" });
  }
  // Add FIN DE STAGE for terminé
  if (row.statut === "Stage terminé") {
    motifsHistorique.push({ cr: crShort, crOrigine: crShort, numInscription: row.numInscription, motif: "ATTESTATION DE FIN DE STAGE", type: "D", effet: row.dateFin || "", session: "", decision: "Validé" });
  }

  const motifsEnAttente = [];

  // ═══ ONGLET STAGE ═══

  // EN-TETE: 5 champs éditables + ELEMENT EN COURS + NOMBRE DE MOIS: lecture seule
  const stageGeneral = [
    [{ label: "Nb de Mois du Stage", value: "36" }, { label: "Cursus de Formation", value: row.cursusFormation }],
    [{ label: "Année de stage", value: row.anneeStage }, { label: "Stage EC/CAC", value: "Oui" }],
    [{ label: "Réduction", value: "" }, { label: "Date de début", value: row.dateEffet, readOnly: ro }],
    [{ label: "Date de fin", value: row.dateFin || "", readOnly: ro }, { label: "Type de cursus", value: cursusLabel, readOnly: ro }],
    [{ label: "Type de stage", value: "CABINET OU SOCIETE D'EXPERTISE COMPTABLE", readOnly: ro }, { label: "Mois validés", value: String(moisValides), readOnly: ro }],
    [{ label: "Mois invalidés", value: "0", readOnly: ro }, { label: "Mois suspension", value: row.statut === "Suspendu" ? "3" : "0", readOnly: ro }],
    [{ label: "Total", value: String(moisValides), readOnly: ro }, { label: "Durée de stage", value: String(moisValides), readOnly: ro }],
    [{ label: "Situation", value: statutUpper, readOnly: ro }],
  ];

  const encadrement = [
    [{ label: "Maître de stage", value: `${crCode}0001${String(hashStr(ms) % 9999).padStart(4,"0")}01  ${ms}`, readOnly: ro }, { label: "Maître de stage CAC", value: msCAC, readOnly: ro }],
    [{ label: "Maître de stage AGC", value: "", readOnly: ro }, { label: "Contrôleur", value: `${crCode}0001${String(hashStr(controleur) % 9999).padStart(4,"0")}01  ${controleur}`, readOnly: ro }],
    [{ label: "CR", value: crCode, readOnly: ro }, { label: "Situation à la date du jour", value: statutUpper, readOnly: ro }],
  ];

  // GROUPES: tout lecture seule
  const groupes = [
    [{ label: "N° Groupe", value: row.groupePrincipal, editable: true }, { label: "An", value: row.anneeStage, readOnly: true }],
    [{ label: "Libellé", value: `${row.groupePrincipal} / ND / ${controleur.split(" ").slice(1).join(" ")}…`, editable: true }, { label: "Rattrapage", value: "Non", readOnly: true }],
    [{ label: "Groupe Principal", value: "Oui", readOnly: true }, { label: "Date de fin", value: row.dateFin || "", readOnly: true }],
  ];

  // PERIODES: tout lecture seule
  const periodes = [
    [{ label: "Début", value: row.dateEffet, readOnly: ro }, { label: "Fin", value: row.dateFin || "(en cours)", readOnly: ro }],
    [{ label: "Durée", value: `${moisValides} mois`, readOnly: ro }, { label: "Type de Stage", value: "CABINET OU SOCIETE D'EXPERTISE COMPTABLE", readOnly: ro }],
    [{ label: "Maître de Stage", value: ms, readOnly: ro }, { label: "Commentaire", value: "", readOnly: ro }],
  ];

  // EMPLOYEURS: tout lecture seule
  const employeurFields = [
    [{ label: "Conseil", value: crCode, readOnly: ro }, { label: "N° supra", value: `${crCode}0002${String(hashStr(employeur) % 9999).padStart(4,"0")}01`, readOnly: ro }],
    [{ label: "N° inscription", value: `${crCode}0002${String(hashStr(employeur) % 9999).padStart(4,"0")}01`, readOnly: ro }, { label: "Effet", value: row.dateEffet, readOnly: ro }],
    [{ label: "Fin", value: "", readOnly: ro }, { label: "Dénomination", value: employeur, readOnly: ro }],
    [{ label: "Qualité", value: "SEC", readOnly: ro }, { label: "CP", value: cp, readOnly: ro }],
  ];

  // ATTESTATION (12 Stage > Attestation) — arbre de synthèse + formulaire
  const hCAC = annee === 1 ? 0 : annee === 2 ? 32 : 64;
  const hSemCAC = 0;
  const hEC = annee === 1 ? 800 : annee === 2 ? 1600 : 2188;
  const moisSusp = row.statut === "Suspendu" ? 3 : 0;
  const ctrlNum = `${crCode}0001${String(hashStr(controleur) % 9999).padStart(4,"0")}01`;
  const ficheCount = annee >= 2 ? 2 : 1;
  const rapportCount = annee === 1 ? 1 : annee === 2 ? 2 : 4;

  const attestation = {
    // 1. Fiches travaux professionnels
    travauxPro: {
      titre: "Fiches travaux professionnels - Commissariat aux comptes",
      heuresCAC: `${hCAC} h`,
      heuresSeminaireCAC: `${hSemCAC} h`,
      heuresEC: `${hEC} h`,
    },
    // 2. Nombre de mois de stage
    moisStage: {
      dateReference: "24/03/2026",
      moisValides: String(moisValides),
      moisNonValides: "0",
      moisSuspendus: String(moisSusp),
      periode: `(${row.dateEffet} - ${row.dateFin || "?"}) ${moisValides} mois validés ~ N° ${ctrlNum}`,
    },
    // 3. Fiches Contrôleurs de stage
    fichesControleurs: Array.from({ length: ficheCount }, (_, i) => ({
      label: `Fiche ${i + 1}`,
      date: `31/01/${yEff + i + 1}`,
    })),
    // 4. Rapports semestriels
    rapports: Array.from({ length: rapportCount }, (_, i) => {
      const mOffset = i % 2 === 0 ? 7 : 1;
      const yOffset = Math.floor((i + 1) / 2) + (i % 2 === 0 ? 0 : 1);
      return { label: `Rapport DIVERS ${Math.floor(i / 2) + 1}`, date: `${mOffset === 7 ? "31/07" : "31/01"}/${yEff + yOffset}` };
    }),
    // 5. Fiches de suivi des Formations
    fichesSuiviFormations: Array.from({ length: ficheCount }, (_, i) => ({
      label: `Fiche ${i + 1}`,
      date: `31/01/${yEff + i + 1}`,
    })),
    // 6. Fiche entretien 2ème année
    ficheEntretien: annee >= 2,
    // 7. Formations (summary count)
    formationsCount: annee === 1 ? 3 : annee === 2 ? 5 : 7,
    // 8. Solde des cotisations
    soldeCotisations: "0.00 €",
    // FORMULAIRE ATTESTATION
    formulaire: {
      dateAttestation: "",
      dateFinStage: "",
      dateEdition: "",
    },
    // INSCRIPTION REUNION COMITE REGIONAL
    comiteRegional: {
      date: "",
      validationCRS: "",
    },
    // AUTRES CHAMPS
    autres: {
      commentaire: "",
      conformiteCRCC: "",
      ficheSynthese: "",
    },
  };

  // SUIVI (10 Stage > Suivi) — liste des obligations avec statut + date
  const obligations = [];
  for (let fi = 0; fi < ficheCount; fi++) {
    obligations.push({ name: `Fiche travaux professionnels ${fi + 1}`, statut: `À remettre le 31/01/${yEff + fi + 1}` });
  }
  for (let fi = 0; fi < ficheCount; fi++) {
    obligations.push({ name: `Fiche Contrôleur de stage ${fi + 1}`, statut: `À remettre le 31/01/${yEff + fi + 1}` });
  }
  for (let ri = 0; ri < rapportCount; ri++) {
    const m = ri % 2 === 0 ? "07" : "01";
    const y = yEff + Math.floor((ri + 1) / 2) + (ri % 2 === 0 ? 0 : 1);
    obligations.push({ name: `Rapport semestriel DIVERS ${Math.floor(ri / 2) + 1}`, statut: `À remettre le 31/${m}/${y}` });
  }
  for (let fi = 0; fi < ficheCount; fi++) {
    obligations.push({ name: `Fiche suivi des formations ${fi + 1}`, statut: `À remettre le 31/01/${yEff + fi + 1}` });
  }
  if (annee >= 2) {
    obligations.push({ name: "Fiche entretien 2ème année", statut: `À remettre le 31/01/${yEff + 2}` });
  }

  // Formations: mark as Réalisé based on année
  const completedCount = annee === 1 ? 3 : annee === 2 ? 5 : 7;
  const formations = ALL_FORMATIONS.map((f, i) => ({
    ...f,
    statut: i < completedCount ? "Réalisé" : "",
  }));

  return { highlights, identite, dossier, adresses, diplomes, modeExercice, motifsHistorique, motifsEnAttente, stageGeneral, encadrement, groupes, periodes, employeurFields, obligations, formations, attestation, diplomesTab };
}

// Simple deterministic hash for consistent data generation
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = ((h << 5) - h + s.charCodeAt(i)) | 0; }
  return Math.abs(h);
}

// GroupesEditableSection — expand Groupes avec edit N° Groupe & Libellé
// Sélectionner un groupe met à jour toutes les infos liées
// ══════════════════════════════════════════════════════════════
function GroupesEditableSection({ fields, defaultOpen = false }) {
  const [open, setOpen] = useState(defaultOpen);
  const [data, setData] = useState(fields);
  const [editingNumero, setEditingNumero] = useState(false);
  const [editingLibelle, setEditingLibelle] = useState(false);
  const [searchNumero, setSearchNumero] = useState("");
  const [searchLibelle, setSearchLibelle] = useState("");

  // Lookup a groupe from GROUPES_LIST by numero and update all fields
  const applyGroupe = (groupe) => {
    setData([
      [{ label: "N° Groupe", value: groupe.numero, editable: true }, { label: "An", value: groupe.annee, readOnly: true }],
      [{ label: "Libellé", value: groupe.libelle, editable: true }, { label: "Rattrapage", value: groupe.rattrapage === "N" ? "Non" : "Oui", readOnly: true }],
      [{ label: "Groupe Principal", value: "Oui", readOnly: true }, { label: "Date de fin", value: groupe.dateFin || "", readOnly: true }],
    ]);
    setEditingNumero(false);
    setEditingLibelle(false);
    setSearchNumero("");
    setSearchLibelle("");
  };

  const filteredByNumero = GROUPES_LIST.filter(g =>
    g.numero.toLowerCase().includes(searchNumero.toLowerCase())
  );
  const filteredByLibelle = GROUPES_LIST.filter(g =>
    g.libelle.toLowerCase().includes(searchLibelle.toLowerCase())
  );

  const currentNumero = data[0]?.[0]?.value || "";
  const currentLibelle = data[1]?.[0]?.value || "";

  return (
    <div className="w-full pb-3">
      <button
        onClick={() => setOpen(!open)}
        className="flex items-center gap-2 w-full h-8 px-2 rounded-lg bg-[#F3F3F3]"
      >
        {open
          ? <ChevronDown size={12} className="text-[#5C5C5C]" />
          : <ChevronRight size={12} className="text-[#5C5C5C]" />}
        <span className="text-[16px] text-[#2E2E2E] leading-[22px]">Groupes</span>
      </button>
      {open && (
        <div className="flex flex-col gap-3 mt-2">
          {data.map((row, ri) => (
            <div key={ri} className="flex gap-3">
              {row.map((field, fi) => {
                // N° Groupe — editable with dropdown
                if (field.label === "N° Groupe") {
                  return (
                    <div key={fi} className="flex-1 pl-1 pb-1 relative">
                      <p className="text-[13px] text-[#5C5C5C] leading-[18px]">{field.label}</p>
                      {editingNumero ? (
                        <div>
                          <div className="flex items-center gap-1 border-b-2 border-[#0250D9] min-h-[24px] pb-1 pt-0.5">
                            <input
                              autoFocus
                              className="flex-1 text-[13px] text-[#2E2E2E] leading-[18px] bg-transparent outline-none"
                              placeholder="Rechercher un groupe…"
                              value={searchNumero}
                              onChange={(e) => setSearchNumero(e.target.value)}
                              onKeyDown={(e) => { if (e.key === "Escape") { setEditingNumero(false); setSearchNumero(""); } }}
                            />
                          </div>
                          <div className="absolute left-0 right-0 z-50 mt-1 bg-white border border-[#C9C9C9] rounded-lg shadow-lg max-h-[200px] overflow-y-auto">
                            {filteredByNumero.length === 0 && (
                              <div className="px-3 py-2 text-[12px] text-[#5C5C5C] italic">Aucun groupe trouvé</div>
                            )}
                            {filteredByNumero.map((g, gi) => (
                              <button
                                key={gi}
                                className="w-full text-left px-3 py-2 hover:bg-[#F3F3F3] transition-colors flex items-center gap-3 border-b border-[#F3F3F3] last:border-0"
                                onClick={() => applyGroupe(g)}
                              >
                                <span className="text-[13px] text-[#03234D] font-medium w-[60px]">{g.numero}</span>
                                <span className="text-[12px] text-[#5C5C5C] truncate">{g.libelle}</span>
                              </button>
                            ))}
                          </div>
                        </div>
                      ) : (
                        <div
                          className="flex items-center gap-1 border-b border-[#C9C9C9] min-h-[24px] pb-1 pt-0.5 hover:border-[#0250D9] transition-colors cursor-pointer"
                          onClick={() => { setEditingNumero(true); setEditingLibelle(false); }}
                        >
                          <span className="flex-1 text-[13px] text-[#2E2E2E] leading-[18px] truncate">{currentNumero || "\u00A0"}</span>
                          <Pencil size={14} className="text-[#5C5C5C] shrink-0 opacity-60" />
                        </div>
                      )}
                    </div>
                  );
                }
                // Libellé — editable with dropdown
                if (field.label === "Libellé") {
                  return (
                    <div key={fi} className="flex-1 pl-1 pb-1 relative">
                      <p className="text-[13px] text-[#5C5C5C] leading-[18px]">{field.label}</p>
                      {editingLibelle ? (
                        <div>
                          <div className="flex items-center gap-1 border-b-2 border-[#0250D9] min-h-[24px] pb-1 pt-0.5">
                            <input
                              autoFocus
                              className="flex-1 text-[13px] text-[#2E2E2E] leading-[18px] bg-transparent outline-none"
                              placeholder="Rechercher par libellé…"
                              value={searchLibelle}
                              onChange={(e) => setSearchLibelle(e.target.value)}
                              onKeyDown={(e) => { if (e.key === "Escape") { setEditingLibelle(false); setSearchLibelle(""); } }}
                            />
                          </div>
                          <div className="absolute left-0 right-0 z-50 mt-1 bg-white border border-[#C9C9C9] rounded-lg shadow-lg max-h-[200px] overflow-y-auto">
                            {filteredByLibelle.length === 0 && (
                              <div className="px-3 py-2 text-[12px] text-[#5C5C5C] italic">Aucun groupe trouvé</div>
                            )}
                            {filteredByLibelle.map((g, gi) => (
                              <button
                                key={gi}
                                className="w-full text-left px-3 py-2 hover:bg-[#F3F3F3] transition-colors flex items-center gap-3 border-b border-[#F3F3F3] last:border-0"
                                onClick={() => applyGroupe(g)}
                              >
                                <span className="text-[13px] text-[#03234D] font-medium truncate">{g.libelle}</span>
                                <span className="text-[12px] text-[#5C5C5C] w-[60px] shrink-0 text-right">{g.numero}</span>
                              </button>
                            ))}
                          </div>
                        </div>
                      ) : (
                        <div
                          className="flex items-center gap-1 border-b border-[#C9C9C9] min-h-[24px] pb-1 pt-0.5 hover:border-[#0250D9] transition-colors cursor-pointer"
                          onClick={() => { setEditingLibelle(true); setEditingNumero(false); }}
                        >
                          <span className="flex-1 text-[13px] text-[#2E2E2E] leading-[18px] truncate">{currentLibelle || "\u00A0"}</span>
                          <Pencil size={14} className="text-[#5C5C5C] shrink-0 opacity-60" />
                        </div>
                      )}
                    </div>
                  );
                }
                // Read-only fields — same rendering as EditableField readOnly
                return (
                  <div key={fi} className="flex-1 pl-1 pb-1">
                    <p className="text-[13px] text-[#5C5C5C] leading-[18px]">{field.label}</p>
                    <div className="flex items-center gap-1 border-b border-transparent min-h-[24px] pb-1 pt-0.5">
                      <span className="flex-1 text-[13px] text-[#2E2E2E] leading-[18px] truncate">
                        {field.value || "\u00A0"}
                      </span>
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function EditableField({ label, value, onChange, readOnly }) {
  const [editing, setEditing] = useState(false);
  const [localVal, setLocalVal] = useState(value);
  const commit = () => { setEditing(false); if (onChange) onChange(localVal); };

  // Read-only mode: no pencil, no click-to-edit, no hover border change
  if (readOnly) {
    return (
      <div className="flex-1 pl-1 pb-1">
        <p className="text-[13px] text-[#5C5C5C] leading-[18px]">{label}</p>
        <div className="flex items-center gap-1 border-b border-transparent min-h-[24px] pb-1 pt-0.5">
          <span className="flex-1 text-[13px] text-[#2E2E2E] leading-[18px] truncate">
            {value || "\u00A0"}
          </span>
        </div>
      </div>
    );
  }

  if (editing) {
    return (
      <div className="flex-1 pl-1 pb-1">
        <p className="text-[13px] text-[#5C5C5C] leading-[18px]">{label}</p>
        <div className="flex items-center gap-1 border-b-2 border-[#0250D9] min-h-[24px] pb-1 pt-0.5">
          <input
            autoFocus
            className="flex-1 text-[13px] text-[#2E2E2E] leading-[18px] bg-transparent outline-none"
            value={localVal}
            onChange={(e) => setLocalVal(e.target.value)}
            onBlur={commit}
            onKeyDown={(e) => { if (e.key === "Enter") commit(); if (e.key === "Escape") { setLocalVal(value); setEditing(false); } }}
          />
        </div>
      </div>
    );
  }
  return (
    <div className="flex-1 pl-1 pb-1 cursor-pointer" onClick={() => setEditing(true)}>
      <p className="text-[13px] text-[#5C5C5C] leading-[18px]">{label}</p>
      <div className="flex items-center gap-1 border-b border-[#C9C9C9] min-h-[24px] pb-1 pt-0.5 hover:border-[#0250D9] transition-colors">
        <span className="flex-1 text-[13px] text-[#2E2E2E] leading-[18px] truncate">
          {value || "\u00A0"}
        </span>
        <Pencil size={14} className="text-[#5C5C5C] shrink-0 opacity-60" />
      </div>
    </div>
  );
}

function StatusBadge({ statut }) {
  if (!statut) return null;
  const colors = {
    "En exercice": { bg: "bg-[#E6F9E6]", text: "text-[#2E844A]", dot: "bg-[#2E844A]" },
    "Stage terminé": { bg: "bg-[#F3F3F3]", text: "text-[#5C5C5C]", dot: "bg-[#5C5C5C]" },
    "Terminé": { bg: "bg-[#F3F3F3]", text: "text-[#5C5C5C]", dot: "bg-[#5C5C5C]" },
    "Suspendu": { bg: "bg-[#FFF4E5]", text: "text-[#B95C00]", dot: "bg-[#B95C00]" },
  };
  const c = colors[statut] || colors["En exercice"];
  return (
    <span className={`inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[12px] font-medium ${c.bg} ${c.text}`}>
      <span className={`w-1.5 h-1.5 rounded-full ${c.dot} inline-block`} />
      {statut}
    </span>
  );
}

function DiplomesTab({ data }) {
  const [selectedIdx, setSelectedIdx] = useState(null);
  const [rows, setRows] = useState(data);
  const selected = selectedIdx !== null ? rows[selectedIdx] : null;

  const updateField = (key, val) => {
    setRows(prev => prev.map((r, i) => i === selectedIdx ? { ...r, [key]: val } : r));
  };

  const thCls = "px-3 py-2 text-left text-[12px] font-semibold text-[#03234D] leading-[16px] whitespace-nowrap border-b border-[#C9C9C9]";
  const tdCls = "px-3 py-2 text-[13px] text-[#2E2E2E] leading-[18px]";
  const inputCls = "w-full h-8 px-2 text-[13px] border border-[#C9C9C9] rounded-md focus:border-[#0250D9] focus:ring-1 focus:ring-[#0250D9] outline-none";

  return (
    <div className="mt-3">
      {/* TABLEAU */}
      <div className="bg-white rounded-[8px] border border-[#C9C9C9] overflow-hidden">
        <div className="px-4 py-2.5 flex items-center justify-between">
          <span className="text-[14px] font-semibold text-[#03234D]">Diplômes ({rows.length})</span>
        </div>
        <table className="w-full text-[13px] border-collapse">
          <thead>
            <tr className="bg-[#F3F3F3]">
              <th className={thCls} style={{ width: "60px" }}>Code</th>
              <th className={thCls}>Diplôme</th>
              <th className={thCls} style={{ width: "65px" }}>Année</th>
              <th className={thCls} style={{ width: "90px" }}>Justificatifs</th>
              <th className={thCls} style={{ width: "110px" }}>Date diplôme</th>
              <th className={thCls}>Titre du mémoire</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((d, i) => (
              <tr
                key={i}
                onClick={() => setSelectedIdx(selectedIdx === i ? null : i)}
                className={`border-b border-[#E5E5E5] cursor-pointer transition-colors ${selectedIdx === i ? "bg-[#E8F0FE]" : "hover:bg-[#F9F9F9]"}`}
              >
                <td className={tdCls}>{d.code}</td>
                <td className={tdCls + " font-medium"}>{d.diplome}</td>
                <td className={tdCls}>{d.annee}</td>
                <td className={tdCls}>{d.justificatifs}</td>
                <td className={tdCls}>{d.dateDiplome}</td>
                <td className={tdCls + " text-[#5C5C5C] italic"}>{d.titrememoire || "—"}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* FORMULAIRE DETAIL */}
      {selected && (
        <div className="mt-3 bg-white rounded-[8px] border border-[#C9C9C9] overflow-hidden">
          <div className="px-4 py-2.5 bg-[#F3F3F3] border-b border-[#C9C9C9] flex items-center justify-between">
            <span className="text-[14px] font-semibold text-[#03234D]">Détail — {selected.diplome}</span>
            <button onClick={() => setSelectedIdx(null)} className="text-[12px] text-[#5C5C5C] hover:text-[#03234D]">Fermer</button>
          </div>
          <div className="p-4 grid grid-cols-2 gap-x-4 gap-y-3">
            <div>
              <label className="block text-[12px] text-[#5C5C5C] mb-1">Diplôme</label>
              <select value={selected.diplome} onChange={e => updateField("diplome", e.target.value)} className={inputCls + " bg-white"}>
                <option value="DSCG">DSCG</option>
                <option value="DSCG sauf UE 1">DSCG sauf UE 1</option>
                <option value="DGC INTEC">DGC INTEC</option>
                <option value="Master CCA">Master CCA</option>
                <option value="DEC (mémoire soutenu)">DEC (mémoire soutenu)</option>
                <option value="DCG">DCG</option>
                <option value="Autre">Autre</option>
              </select>
            </div>
            <div>
              <label className="block text-[12px] text-[#5C5C5C] mb-1">Année Obtention</label>
              <input type="text" value={selected.annee} onChange={e => updateField("annee", e.target.value)} className={inputCls} />
            </div>
            <div>
              <label className="block text-[12px] text-[#5C5C5C] mb-1">Justificatifs</label>
              <div className="flex items-center gap-4 h-8">
                <label className="flex items-center gap-1.5 text-[13px] text-[#2E2E2E] cursor-pointer">
                  <input type="radio" name="justif" checked={selected.justificatifs === "Oui"} onChange={() => updateField("justificatifs", "Oui")} className="accent-[#0250D9]" />
                  Oui
                </label>
                <label className="flex items-center gap-1.5 text-[13px] text-[#2E2E2E] cursor-pointer">
                  <input type="radio" name="justif" checked={selected.justificatifs === "Non"} onChange={() => updateField("justificatifs", "Non")} className="accent-[#0250D9]" />

            <div className="flex border border-[#5C5C5C] rounded-full overflow-hidden">
              <button onClick={() => setShowNewModal(true)} className="px-4 h-8 text-[14px] text-[#0250D9] bg-white border-r border-[#5C5C5C] hover:bg-[#F3F3F3] transition-colors">Créer un groupe</button>
              <button className="px-2 h-8 bg-white flex items-center justify-center">
                <ChevronDown size={14} className="text-[#5C5C5C]" />
              </button>
            </div>
          </div>
        </div>
        <div className="flex items-center justify-between mt-2">
          <p className="text-[13px] text-[#5C5C5C]">{allGroupes.length} éléments • Trié par Conseil régional • Mis à jour il y a quelques secondes</p>
          <ListViewToolbar />
        </div>
      </div>
      <div className="flex-1 overflow-auto bg-white mx-4 rounded-t-lg">
        <GroupesDataTable data={allGroupes} onRowClick={onNavigateToGroupe} />
      </div>

      {showNewModal && (
        <NouveauGroupeModal
          onClose={() => setShowNewModal(false)}
          onSave={handleSaveGroupe}
        />
      )}
    </>
  );
}

// MODALE — Ajout de stagiaires / contrôleur au groupe
// ══════════════════════════════════════════════════════════════

function AddStagiairesModal({ onClose, onAdd, excludeIds, mode = "stagiaire" }) {
  const isCtr = mode === "controleur";
  const pool = isCtr ? EC_POOL : INDIVIDUS_POOL;
  const modalTitle = isCtr
    ? "Recherche d'un expert-comptable (contrôleur)"
    : "Recherche d'un stagiaire / mémorialiste / diplômé non inscrit";
  const modalSubtitle = isCtr
    ? "Sélectionnez le contrôleur à assigner au groupe"
    : "Sélectionnez les stagiaires à ajouter au groupe";

  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState({});

  // Filter out already-excluded and apply search
  const filtered = pool.filter(ind => {
    if (excludeIds && excludeIds.includes(ind.numInscription)) return false;
    if (!search) return true;
    const q = search.toLowerCase();
    return (
      ind.nom.toLowerCase().includes(q) ||
      ind.prenom.toLowerCase().includes(q) ||
      ind.ville.toLowerCase().includes(q) ||
      ind.numInscription.toLowerCase().includes(q) ||
      ind.departement.toLowerCase().includes(q)
    );
  });

  const selectedCount = Object.values(selected).filter(Boolean).length;
  const toggleAll = () => {
    if (isCtr) return; // no select-all in contrôleur mode
    if (selectedCount === filtered.length) {
      setSelected({});
    } else {
      const next = {};
      filtered.forEach(ind => { next[ind.numInscription] = true; });
      setSelected(next);
    }
  };
  const toggle = (id) => {
    if (isCtr) {
      // Single-select: only one at a time
      setSelected(prev => prev[id] ? {} : { [id]: true });
    } else {
      setSelected(prev => ({ ...prev, [id]: !prev[id] }));
    }
  };

  const handleAdd = () => {
    const toAdd = pool.filter(ind => selected[ind.numInscription]);
    if (toAdd.length > 0) onAdd(toAdd);
  };

  const thCls = "px-2 py-2 text-left text-[12px] font-semibold text-[#03234D] leading-[16px] whitespace-nowrap";

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center" style={{ background: "rgba(0,0,0,0.45)" }}>
      <div className="bg-white rounded-lg shadow-2xl flex flex-col" style={{ width: 960, maxHeight: "85vh" }}>
        {/* Header */}
        <div className="flex items-start gap-3 px-6 pt-5 pb-3">
          <div className="w-10 h-10 rounded-full bg-[#D1242F] flex items-center justify-center shrink-0">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </div>
          <div className="flex-1 min-w-0">
            <p className="text-[16px] font-semibold text-[#03234D] leading-[22px]">{modalTitle}</p>
            <p className="text-[13px] text-[#5C5C5C] leading-[18px]">{modalSubtitle}</p>
          </div>
          <button onClick={onClose} className="w-6 h-6 flex items-center justify-center text-[#5C5C5C] hover:text-[#03234D]">
            <XIcon size={16} />
          </button>
        </div>

        {/* Search bar */}
        <div className="flex items-center gap-3 px-6 pb-3">
          <div className="flex items-center flex-1 border border-[#C9C9C9] rounded px-3 h-9">
            <Search size={14} className="text-[#5C5C5C] mr-2 shrink-0" />
            <input
              type="text"
              placeholder="Rechercher par nom, ville..."
              className="flex-1 text-[13px] outline-none bg-transparent"
              value={search}
              onChange={e => setSearch(e.target.value)}
            />
          </div>
          <span className="text-[13px] text-[#5C5C5C] whitespace-nowrap">{filtered.length} résultat(s)</span>
        </div>

        {/* Table */}
        <div className="flex-1 overflow-auto px-6">
          <table className="w-full border-collapse text-[13px]">
            <thead className="sticky top-0 z-10">
              <tr className="bg-[#F3F3F3] border-b border-[#C9C9C9]">
                <th className="w-[36px] px-2 py-2">
                  {isCtr ? null : <input type="checkbox" className="w-4 h-4 accent-[#0250D9]" checked={selectedCount === filtered.length && filtered.length > 0} onChange={toggleAll} />}
                </th>
                <th className={thCls}>N° Inscription</th>
                <th className={thCls}>Prénom</th>
                <th className={thCls}>Nom</th>
                <th className={thCls} style={{width:"60px"}}>Qualité</th>
                <th className={thCls}>Statut</th>
                <th className={thCls}>Date Naiss.</th>
                <th className={thCls}>Ville d'exercice</th>
                <th className={thCls} style={{width:"40px"}}>Dép</th>
                <th className={thCls}>Département</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map((ind, i) => {
                const checked = !!selected[ind.numInscription];
                return (
                  <tr key={ind.numInscription}
                    className={`border-b border-[#E5E5E5] cursor-pointer transition-colors ${checked ? "bg-[#EEF4FF]" : "hover:bg-[#F9F9F9]"}`}
                    onClick={() => toggle(ind.numInscription)}
                  >
                    <td className="px-2 py-1.5"><input type={isCtr ? "radio" : "checkbox"} name={isCtr ? "ctr-select" : undefined} className="w-4 h-4 accent-[#0250D9]" checked={checked} readOnly /></td>
                    <td className="px-2 py-1.5 text-[#2E2E2E]">{ind.numInscription}</td>
                    <td className="px-2 py-1.5 text-[#2E2E2E]">{ind.prenom}</td>
                    <td className="px-2 py-1.5 font-semibold text-[#03234D]">{ind.nom}</td>
                    <td className="px-2 py-1.5 text-[#2E2E2E]">{ind.qualite}</td>
                    <td className="px-2 py-1.5 text-[#2E2E2E]">{ind.statut}</td>
                    <td className="px-2 py-1.5 text-[#2E2E2E]">{ind.dateNaiss}</td>
                    <td className="px-2 py-1.5 text-[#2E2E2E]">{ind.ville}</td>
                    <td className="px-2 py-1.5 text-[#2E2E2E]">{ind.dep}</td>
                    <td className="px-2 py-1.5 text-[#2E2E2E]">{ind.departement}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        {/* Footer */}
        <div className="flex items-center justify-between px-6 py-4 border-t border-[#E5E5E5]">
          <span className="text-[13px] text-[#5C5C5C]">Affichage individu 1 – {filtered.length} sur {filtered.length}</span>
          <div className="flex items-center gap-3">
            <button onClick={onClose} className="px-4 h-8 border border-[#5C5C5C] rounded-full text-[14px] text-[#03234D] bg-white">Fermer</button>
            <button
              onClick={handleAdd}
              disabled={selectedCount === 0}
              className={`px-4 h-8 rounded-full text-[14px] text-white ${selectedCount > 0 ? "bg-[#0250D9] hover:bg-[#013DA6] cursor-pointer" : "bg-[#C9C9C9] cursor-not-allowed"}`}
            >
              {isCtr ? (selectedCount > 0 ? "Assigner le contrôleur" : "Assigner le contrôleur") : `Ajouter la sélection${selectedCount > 0 ? ` (${selectedCount})` : ""}`}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

          <button
            onClick={() => dateFin.trim() && onConfirm(dateFin.trim())}
            disabled={!dateFin.trim()}
            className={`px-4 h-8 rounded-full text-[14px] text-white ${dateFin.trim() ? "bg-[#0250D9] hover:bg-[#013DA6] cursor-pointer" : "bg-[#C9C9C9] cursor-not-allowed"}`}
          >
            Confirmer et continuer
          </button>
        </div>
      </div>
    </div>
  );
}

function GroupeRecordPage({ groupe, onNavigateToRecord }) {
  const [activeTab, setActiveTab] = useState("stagiaires");
  const [showAddModal, setShowAddModal] = useState(false);
  const [addedStagiaires, setAddedStagiaires] = useState([]);

  // Contrôleur management
  const [showControleurModal, setShowControleurModal] = useState(false);
  const [showClotureModal, setShowClotureModal] = useState(false);
  const [controleurHistory, setControleurHistory] = useState(() => {
    // Initialize from groupe.controleur if one exists
    if (groupe.controleur) {
      return [{
        numInscription: groupe.numero + "-CTR-01",
        controleur: groupe.controleur,
        statut: "En exercice",
        dateEffet: groupe.dateConstitution,
        dateFin: "",
      }];
    }
    return [];
  });

  const activeControleur = controleurHistory.find(c => c.statut === "En exercice");
  const hasActiveControleur = !!activeControleur;

  // Find stagiaires belonging to this groupe + manually added ones
  const groupeStagiaires = [
    ...STAGIAIRES_LIST.filter(s => s.groupePrincipal === groupe.numero),
    ...addedStagiaires,
  ];

  // IDs to exclude from the modal (already in the group)
  const excludeIds = groupeStagiaires.map(s => s.numInscription);

  const handleAddStagiaires = (individus) => {
    // Convert individus to stagiaire format and add them
    const newStagiaires = individus.map(ind => ({
      cr: ind.departement,
      numInscription: ind.numInscription,
      groupePrincipal: groupe.numero,
      stagiaire: ind.nom + " " + ind.prenom,
      statut: "En exercice",
      dscg: "Complet",
      cursusFormation: "1",
      dateEffet: groupe.dateConstitution,
      dateFin: "",
      anneeStage: groupe.annee,
    }));
    setAddedStagiaires(prev => [...prev, ...newStagiaires]);
    setShowAddModal(false);
  };

  // Contrôleur: handle "Ajouter contrôleur" button click
  const handleControleurButtonClick = () => {
    if (hasActiveControleur) {
      // Must close current before adding new → show clôture modal
      setShowClotureModal(true);
    } else {
      // No active → directly open search modal
      setShowControleurModal(true);
    }
  };

  // Contrôleur: after setting date de fin on current, open search modal
  const handleClotureConfirm = (dateFin) => {
    setControleurHistory(prev => prev.map(c =>
      c.statut === "En exercice" ? { ...c, statut: "Terminé", dateFin } : c
    ));
    setShowClotureModal(false);
    setShowControleurModal(true);
  };

  // Contrôleur: assign new from search modal
  const handleAddControleur = (individus) => {
    const ind = individus[0]; // single select
    const ctrIndex = controleurHistory.length + 1;
    const newCtr = {
      numInscription: groupe.numero + "-CTR-" + String(ctrIndex).padStart(2, "0"),
      controleur: ind.nom + " " + ind.prenom,
      statut: "En exercice",
      dateEffet: new Date().toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "numeric" }),
      dateFin: "",
    };
    setControleurHistory(prev => [...prev, newCtr]);
    setShowControleurModal(false);
  };

  // ── Suppression stagiaire ──
  const [deleteConfirm, setDeleteConfirm] = useState(null); // { type: "stagiaire"|"controleur", target }
  const [removedOriginals, setRemovedOriginals] = useState([]); // numInscription of original stagiaires removed

  const handleDeleteStagiaire = (s) => {
    setDeleteConfirm({
      type: "stagiaire",
      target: s,
      title: "Retirer le stagiaire",
      message: `Êtes-vous sûr de vouloir retirer ${s.stagiaire} de ce groupe ?`,
    });
  };

  const handleDeleteControleur = (ctr) => {
    if (ctr.statut === "En exercice") {
      // Active: must set date de fin first → show clôture modal then remove
      setDeleteConfirm({
        type: "controleur-actif",
        target: ctr,
        title: "Retirer le contrôleur actif",
        message: `${ctr.controleur} est actuellement actif. Souhaitez-vous le retirer et mettre fin à sa mission ?`,
      });
    } else {
      // Terminé: simple removal from history
      setDeleteConfirm({
        type: "controleur",
        target: ctr,
        title: "Supprimer de l'historique",
        message: `Êtes-vous sûr de vouloir supprimer ${ctr.controleur} de l'historique des contrôleurs ?`,
      });
    }
  };

  const confirmDelete = () => {
    if (!deleteConfirm) return;
    const { type, target } = deleteConfirm;
    if (type === "stagiaire") {
      // Check if it's from addedStagiaires or from original list
      const isAdded = addedStagiaires.some(s => s.numInscription === target.numInscription);
      if (isAdded) {
        setAddedStagiaires(prev => prev.filter(s => s.numInscription !== target.numInscription));
      } else {
        setRemovedOriginals(prev => [...prev, target.numInscription]);
      }
    } else if (type === "controleur") {
      setControleurHistory(prev => prev.filter(c => c.numInscription !== target.numInscription));
    } else if (type === "controleur-actif") {
      // Set today as date de fin and mark as Terminé (remove from active)
      const today = new Date();
      const dd = String(today.getDate()).padStart(2, "0");
      const mm = String(today.getMonth() + 1).padStart(2, "0");
      const yyyy = today.getFullYear();
      setControleurHistory(prev => prev.map(c =>
        c.numInscription === target.numInscription
          ? { ...c, statut: "Terminé", dateFin: `${dd}/${mm}/${yyyy}` }
          : c
      ));
    }
    setDeleteConfirm(null);
  };

  // Filter out removed originals from groupeStagiaires
  const visibleStagiaires = groupeStagiaires.filter(s => !removedOriginals.includes(s.numInscription));

  return (
    <>
      {/* Page Header */}
      <div className="bg-[#F3F3F3] px-4 py-4">
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 rounded bg-[#5867E8] flex items-center justify-center">
              <Users size={16} className="text-white" />
            </div>
            <div>
              <p className="text-[13px] text-[#5C5C5C] leading-[18px]">Account</p>
              <p className="text-[28px] text-[#03234D] leading-[35px]">{groupe.libelle}</p>
            </div>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={() => setShowAddModal(true)} className="flex items-center gap-2 border border-[#0250D9] rounded-full px-4 h-8 bg-white">
              <Plus size={14} className="text-[#0250D9]" />
              <span className="text-[14px] text-[#0250D9]">Ajouter stagiaire(s)</span>
            </button>
            <button onClick={handleControleurButtonClick} className="flex items-center gap-2 border border-[#0250D9] rounded-full px-4 h-8 bg-white">
              <Plus size={14} className="text-[#0250D9]" />
              <span className="text-[14px] text-[#0250D9]">Ajouter contrôleur</span>
            </button>
            <div className="flex border border-[#5C5C5C] rounded-full overflow-hidden">
              <button className="px-4 h-8 text-[14px] text-[#0250D9] bg-white border-r border-[#5C5C5C]">Modifier</button>
              <button className="px-4 h-8 text-[14px] text-[#0250D9] bg-white">Supprimer</button>
            </div>
            <button className="w-8 h-8 border border-[#5C5C5C] rounded-full bg-white flex items-center justify-center">
              <ChevronDown size={14} className="text-[#5C5C5C]" />
            </button>
          </div>
        </div>
      </div>

      {/* Highlights */}
      <div className="bg-[#F3F3F3] px-4 pb-4">
        <div className="flex gap-16">
          {[
            { label: "Libellé", value: groupe.libelle },
            { label: "Conseil régional", value: groupe.cro },
            { label: "Année", value: groupe.annee },
            { label: "Date de constitution", value: groupe.dateConstitution },
            { label: "Date de fin", value: groupe.dateFin || "\u00A0" },
            { label: "Contrôleur", value: groupe.controleur || "\u00A0" },
          ].map((f, i) => (
            <div key={i} className="flex flex-col gap-0.5 max-w-[225px] shrink-0">
              <p className="text-[12px] text-[#5C5C5C] leading-[17px] truncate">{f.label}</p>
              <p className="text-[13px] text-[#03234D] leading-[18px] truncate">{f.value}</p>
            </div>
          ))}
        </div>
      </div>

      {/* Content area */}
      <div className="flex-1 overflow-auto px-4 pt-[1px]">
        <div className="bg-white rounded-[20px] overflow-hidden max-w-[1408px]">
          <div className="px-4 pt-4 pb-3">
            {/* Tabs: Stagiaires / Contrôleur */}
            <div className="flex w-full">
              {["stagiaires", "controleur"].map((tab) => (
                <button
                  key={tab}
                  onClick={() => setActiveTab(tab)}
                  className={`px-3 h-10 text-[14px] font-semibold whitespace-nowrap ${
                    activeTab === tab
                      ? "text-[#0250D9] border-b-[3px] border-[#0250D9]"
                      : "text-[#5C5C5C] border-b border-[#C9C9C9]"
                  }`}
                >
                  {tab === "stagiaires" ? "Stagiaires" : "Contrôleur"}
                </button>
              ))}
              <div className="flex-1 border-b border-[#C9C9C9]" />
            </div>

            {/* Tab content */}
            {activeTab === "stagiaires" && (
              <div className="mt-4">
                {visibleStagiaires.length === 0 ? (
                  <div className="flex flex-col items-center justify-center py-16">
                    <EmptyStateIllustration />
                    <p className="text-[20px] text-[#03234D] mt-6 font-medium">Aucun stagiaire</p>
                    <p className="text-[14px] text-[#5C5C5C] mt-2">Cliquez sur « Ajouter stagiaire(s) » pour en ajouter</p>
                  </div>
                ) : (
                  <div className="overflow-auto">
                    <table className="w-full border-collapse text-[13px]">
                      <thead>
                        <tr className="bg-[#F3F3F3] border-b border-[#C9C9C9]">
                          {[
                            { label: "Conseil régional", w: "140px" },
                            { label: "N° Inscription", w: "130px" },
                            { label: "Groupe principal", w: "110px" },
                            { label: "Stagiaire", w: "auto" },
                            { label: "Statut", w: "120px" },
                            { label: "DSCG", w: "80px" },
                            { label: "Cursus de formation", w: "130px" },
                            { label: "Date d'effet", w: "100px" },
                            { label: "Date de fin", w: "100px" },
                            { label: "Année de stage", w: "100px" },
                          ].map((c, ci) => (
                            <th key={ci} className="px-2 py-2 text-left text-[12px] font-semibold text-[#03234D] leading-[16px] whitespace-nowrap" style={{ width: c.w }}>
                              <div className="flex items-center gap-1">{c.label} <ChevronDown size={10} className="text-[#5C5C5C]" /></div>
                            </th>
                          ))}
                          <th className="w-[44px] px-1 py-2"></th>
                        </tr>
                      </thead>
                      <tbody>
                        {visibleStagiaires.map((s, i) => (
                          <tr key={i} className="border-b border-[#E5E5E5] hover:bg-[#F9F9F9] cursor-pointer transition-colors group">
                            <td className="px-2 py-2 text-[#2E2E2E]">{s.cr}</td>
                            <td className="px-2 py-2">
                              <a href="#" onClick={(e) => { e.preventDefault(); if(onNavigateToRecord) onNavigateToRecord(s); }} className="text-[#0250D9] underline font-medium">{s.numInscription}</a>
                            </td>
                            <td className="px-2 py-2 text-[#2E2E2E]">{s.groupePrincipal}</td>
                            <td className="px-2 py-2">
                              <a href="#" onClick={(e) => { e.preventDefault(); if(onNavigateToRecord) onNavigateToRecord(s); }} className="text-[#0250D9] underline font-medium">{s.stagiaire}</a>
                            </td>
                            <td className="px-2 py-2"><StatusBadge statut={s.statut} /></td>
                            <td className="px-2 py-2 text-[#2E2E2E]">{s.dscg}</td>
                            <td className="px-2 py-2 text-[#2E2E2E]">{s.cursusFormation}</td>
                            <td className="px-2 py-2 text-[#2E2E2E]">{s.dateEffet}</td>
                            <td className="px-2 py-2 text-[#2E2E2E]">{s.dateFin}</td>
                            <td className="px-2 py-2 text-[#2E2E2E]">{s.anneeStage}</td>
                            <td className="px-1 py-2 text-center">
                              <button
                                onClick={(e) => { e.stopPropagation(); handleDeleteStagiaire(s); }}
                                className="w-7 h-7 rounded flex items-center justify-center text-[#5C5C5C] opacity-0 group-hover:opacity-100 hover:bg-[#FEE2E2] hover:text-[#D1242F] transition-all"
                                title="Retirer du groupe"
                              >
                                <TrashIcon size={14} />
                              </button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            )}

            {activeTab === "controleur" && (
              <div className="mt-4">
                {controleurHistory.length > 0 ? (
                  <div className="overflow-auto">
                    <table className="w-full border-collapse text-[13px]">
                      <thead>
                        <tr className="bg-[#F3F3F3] border-b border-[#C9C9C9]">
                          {[
                            { label: "N° Inscription", w: "160px" },
                            { label: "Contrôleur", w: "auto" },
                            { label: "Statut", w: "130px" },
                            { label: "Date d'effet", w: "120px" },
                            { label: "Date de fin", w: "120px" },
                          ].map((c, ci) => (
                            <th key={ci} className="px-2 py-2 text-left text-[12px] font-semibold text-[#03234D] leading-[16px] whitespace-nowrap" style={{ width: c.w }}>
                              <div className="flex items-center gap-1">{c.label} <ChevronDown size={10} className="text-[#5C5C5C]" /></div>
                            </th>
                          ))}
                          <th className="w-[44px] px-1 py-2"></th>
                        </tr>
                      </thead>
                      <tbody>
                        {controleurHistory.map((ctr, i) => (
                          <tr key={i} className="border-b border-[#E5E5E5] hover:bg-[#F9F9F9] transition-colors group">
                            <td className="px-2 py-2">
                              <span className="text-[#0250D9] underline font-medium">{ctr.numInscription}</span>
                            </td>
                            <td className="px-2 py-2">
                              <span className="text-[#0250D9] underline font-medium">{ctr.controleur}</span>
                            </td>
                            <td className="px-2 py-2"><StatusBadge statut={ctr.statut} /></td>
                            <td className="px-2 py-2 text-[#2E2E2E]">{ctr.dateEffet}</td>
                            <td className="px-2 py-2 text-[#2E2E2E]">{ctr.dateFin}</td>
                            <td className="px-1 py-2 text-center">
                              <button
                                onClick={(e) => { e.stopPropagation(); handleDeleteControleur(ctr); }}
                                className="w-7 h-7 rounded flex items-center justify-center text-[#5C5C5C] opacity-0 group-hover:opacity-100 hover:bg-[#FEE2E2] hover:text-[#D1242F] transition-all"
                                title={ctr.statut === "En exercice" ? "Retirer le contrôleur" : "Supprimer de l'historique"}
                              >
                                <TrashIcon size={14} />
                              </button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                ) : (
                  <div className="flex flex-col items-center justify-center py-16">
                    <EmptyStateIllustration />
                    <p className="text-[20px] text-[#03234D] mt-6 font-medium">Aucun contrôleur</p>
                    <p className="text-[14px] text-[#5C5C5C] mt-2">Cliquez sur « Ajouter contrôleur » pour en assigner un</p>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Modal ajout stagiaires */}
      {showAddModal && (
        <AddStagiairesModal
          onClose={() => setShowAddModal(false)}
          onAdd={handleAddStagiaires}
          excludeIds={excludeIds}
        />
      )}

      {/* Modal clôture contrôleur */}
      {showClotureModal && activeControleur && (
        <ClotureControleurModal
          controleurName={activeControleur.controleur}
          onConfirm={handleClotureConfirm}
          onClose={() => setShowClotureModal(false)}
        />
      )}

      {/* Modal recherche contrôleur */}
      {showControleurModal && (
        <AddStagiairesModal
          mode="controleur"
          onClose={() => setShowControleurModal(false)}
          onAdd={handleAddControleur}
          excludeIds={[]}
        />
      )}

      {/* Modal confirmation suppression */}
      {deleteConfirm && (
        <ConfirmDeleteModal
          title={deleteConfirm.title}
          message={deleteConfirm.message}
          onConfirm={confirmDelete}
          onClose={() => setDeleteConfirm(null)}
        />
      )}
    </>
  );
}

// ══════════════════════════════════════════════════════════════
// MAIN APP — Router
// ══════════════════════════════════════════════════════════════

// Inline SVG icons for tab actions
function XIcon({ size = 14, className = "" }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
}
function CheckIcon({ size = 14, className = "" }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>;
}

function App() {
  // activePage: "list" | "groupes" | "record:<numInscription>" | "groupe:<numero>"
  const [activePage, setActivePage] = useState("list");
  // openTabs: array of { type: "record"|"groupe", id, label, data }
  const [openTabs, setOpenTabs] = useState([]);

  const handleNavigateToRecord = (row) => {
    const tabId = "record:" + row.numInscription;
    setOpenTabs(prev => {
      const exists = prev.find(t => t.id === tabId);
      if (!exists) return [...prev, { type: "record", id: tabId, label: row.stagiaire, data: row }];
      return prev;
    });
    setActivePage(tabId);
  };

  const handleNavigateToGroupe = (row) => {
    const tabId = "groupe:" + row.numero;
    setOpenTabs(prev => {
      const exists = prev.find(t => t.id === tabId);
      if (!exists) return [...prev, { type: "groupe", id: tabId, label: row.libelle, data: row }];
      return prev;
    });
    setActivePage(tabId);
  };

  const handleCloseTab = (e, tabId) => {
    e.stopPropagation();
    setOpenTabs(prev => prev.filter(t => t.id !== tabId));
    if (activePage === tabId) {
      setActivePage("list");
    }
  };

  // Determine what to render
  const isListActive = activePage === "list";
  const isGroupesActive = activePage === "groupes";
  const activeTab = openTabs.find(t => t.id === activePage);

  return (
    <div className="flex flex-col h-screen bg-[#F3F3F3] overflow-hidden"
         style={{ fontFamily: "-apple-system, 'SF Pro', system-ui, BlinkMacSystemFont, sans-serif" }}>
      <GlobalHeader />

      {/* ── Navigation tabs bar ── */}
      <div className="bg-white flex items-center h-10 border-b border-[#e5e5e5] overflow-x-auto">
        {/* App launcher */}
        <button className="flex items-center gap-1 px-3 h-full text-[13px] font-semibold text-[#03234D] shrink-0">
          <Grid3X3 size={14} className="text-[#5C5C5C]" /> PEP
        </button>

        {/* Stagiaires tab */}
        <button
          onClick={() => setActivePage("list")}
          className={`flex items-center gap-1 px-3 h-full text-[13px] shrink-0 ${isListActive ? "text-[#0250D9] font-semibold border-b-[3px] border-[#0250D9]" : "text-[#5C5C5C] hover:text-[#03234D]"}`}
        >
          Stagiaires <ChevronDown size={12} />
        </button>

        {/* Groupes de stagiaires tab */}
        <button
          onClick={() => setActivePage("groupes")}
          className={`flex items-center gap-1 px-3 h-full text-[13px] shrink-0 ${isGroupesActive ? "text-[#0250D9] font-semibold border-b-[3px] border-[#0250D9]" : "text-[#5C5C5C] hover:text-[#03234D]"}`}
        >
          Groupes de stagiaires <ChevronDown size={12} />
        </button>

        {/* Open tabs — persistent until closed (records + groupes) */}
        {openTabs.map(tab => {
          const isActive = activePage === tab.id;
          const tabLabel = tab.label;
          return (
            <button
              key={tab.id}
              onClick={() => setActivePage(tab.id)}
              className={`flex items-center gap-1.5 px-3 h-full text-[13px] shrink-0 group ${isActive ? "text-[#0250D9] font-semibold border-b-[3px] border-[#0250D9]" : "text-[#5C5C5C] hover:text-[#03234D]"}`}
            >
              {tabLabel}
              <CheckIcon size={12} className={isActive ? "text-[#0250D9]" : "text-[#5C5C5C]"} />
              <span
                onClick={(e) => handleCloseTab(e, tab.id)}
                className="ml-0.5 rounded hover:bg-[#F3F3F3] p-0.5 transition-colors"
                title="Fermer cet onglet"
              >
                <XIcon size={12} className={`${isActive ? "text-[#0250D9]" : "text-[#5C5C5C]"} hover:text-[#D1242F]`} />
              </span>
            </button>
          );
        })}
      </div>

      {/* ── Page content ── */}
      {isListActive && <ListViewPage onNavigateToRecord={handleNavigateToRecord} />}
      {isGroupesActive && <GroupesListViewPage onNavigateToGroupe={handleNavigateToGroupe} />}
      {activeTab && activeTab.type === "record" && <RecordPage row={activeTab.data} />}
      {activeTab && activeTab.type === "groupe" && <GroupeRecordPage groupe={activeTab.data} onNavigateToRecord={handleNavigateToRecord} />}

      <DockedUtilityBar />
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
