            {/* Grid split */}
            <div className="flex items-center">
              <button className="flex items-center justify-center w-[32px] h-[32px] bg-white rounded-l-full hover:bg-[#f3f3f3] transition-colors" style={{ border: "1.5px solid #c9c9c9", borderRight: "none" }}>
                <SvgGrid size={16} color="#0250d9" />
              </button>
              <button className="flex items-center justify-center w-[24px] h-[32px] bg-white rounded-r-full hover:bg-[#f3f3f3] transition-colors" style={{ border: "1.5px solid #c9c9c9" }}>
                <SvgChevDown3 size={8} color="#0250d9" />
              </button>
            </div>
            {/* Single icons: Edit, Refresh */}
            <button className="flex items-center justify-center w-[32px] h-[32px] bg-white rounded-full hover:bg-[#f3f3f3] transition-colors" style={{ border: "1.5px solid #c9c9c9" }}>
              <SvgEdit2 size={16} color="#0250d9" />
            </button>
            <button className="flex items-center justify-center w-[32px] h-[32px] bg-white rounded-full hover:bg-[#f3f3f3] transition-colors" style={{ border: "1.5px solid #c9c9c9" }}>
              <SvgRefresh size={16} color="#0250d9" />
            </button>
            {/* Download + Filter joined group */}
            <div className="flex items-center">
              <button className="flex items-center justify-center w-[32px] h-[32px] bg-white rounded-l-full hover:bg-[#f3f3f3] transition-colors" style={{ border: "1.5px solid #c9c9c9", borderRight: "none" }}>
                <SvgDownload size={16} color="#0250d9" />
              </button>
              <button className="flex items-center justify-center w-[32px] h-[32px] bg-white rounded-r-full hover:bg-[#f3f3f3] transition-colors" style={{ border: "1.5px solid #c9c9c9" }}>
                <SvgFilter size={16} color="#0250d9" />
              </button>
            </div>
          </div>
        </div>
      </div>
    );

    /* ═══════════════════════════════════════════════
       DATA TABLE
       ═══════════════════════════════════════════════ */
    const DataTable = () => {
      const [selectedRows, setSelectedRows] = useState(new Set([10])); /* row 10 selected by default like Figma */
      const [allSelected, setAllSelected] = useState(false);

      const toggleRow = (id) => {
        const next = new Set(selectedRows);
        if (next.has(id)) next.delete(id); else next.add(id);
        setSelectedRows(next);
      };

      const toggleAll = () => {
        if (allSelected) {
          setSelectedRows(new Set());
        } else {
          setSelectedRows(new Set(TABLE_ROWS.map(r => r.id)));
        }
        setAllSelected(!allSelected);
      };

      return (
        <div className="flex-1 overflow-auto bg-white">
          {/* Table header */}
          <div className="flex items-center h-[36px] bg-[#f3f3f3] border-y border-[#c9c9c9] sticky top-0 z-10">
            {/* Checkbox column */}
            <div className="w-[44px] shrink-0 flex items-center justify-center" style={{ borderRight: "1px solid #c9c9c9" }}>
              <button
                onClick={toggleAll}
                className="w-[20px] h-[20px] rounded-[6px] flex items-center justify-center bg-[#0250d9]"
              >
                <SvgMinus size={10} color="white" />
              </button>
            </div>
            {/* Column headers */}
            {TABLE_COLUMNS.map((col, i) => (
              <div key={i} className={`${col.width} flex items-center justify-between px-[12px] h-full min-w-0`} style={{ borderRight: "1px solid #c9c9c9" }}>
                <span className="truncate text-[13px] font-medium text-[#2e2e2e]">{col.label}</span>
                <SvgChevDown3 size={10} color="#5c5c5c" />
              </div>
            ))}
          </div>

          {/* Table rows */}
          {TABLE_ROWS.map((row) => {
            const isSelected = selectedRows.has(row.id);
            return (
              <div
                key={row.id}
                className={`flex items-center h-[36px] border-b border-[#e5e5e5] text-[13px] transition-colors ${
                  isSelected ? "bg-[#eaf5fe]" : "bg-white hover:bg-[#f9f9f9]"
                }`}
              >
                {/* Checkbox */}
                <div className="w-[44px] shrink-0 flex items-center justify-center">
                  <button
                    onClick={() => toggleRow(row.id)}
                    className={`w-[20px] h-[20px] rounded-[6px] flex items-center justify-center transition-colors ${
                      isSelected ? "bg-[#0250d9]" : "bg-white"
                    }`}
                    style={{ border: isSelected ? "none" : "1.5px solid #c9c9c9" }}
                  >
                    {isSelected && (
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" style={{ display: "block" }}>
                        <polyline points="20 6 9 17 4 12" />
                      </svg>
                    )}
                  </button>
                </div>
                {/* Data cells */}
                {TABLE_COLUMNS.map((col, ci) => (
                  <div key={ci} className={`${col.width} px-[12px] truncate min-w-0`}>
                    {col.key === "accountName" ? (
                      <span className="text-[#0250d9] hover:underline cursor-pointer">{row[col.key]}</span>
                    ) : (
                      <span className="text-[#2e2e2e]">{row[col.key]}</span>
                    )}
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      );
    };

    /* ═══════════════════════════════════════════════
       BOTTOM BAR (identical)
       ═══════════════════════════════════════════════ */
    const BottomBar = () => (
      <div className="fixed bottom-0 left-0 right-0 h-[32px] bg-white border-t border-[#c9c9c9] flex items-center px-[16px] gap-[8px] z-50">
        <SvgListTodo size={14} color="#747474" />
        <span className="text-[12px] text-[#5c5c5c] font-normal">To Do List</span>
      </div>
    );

    /* ═══════════════════════════════════════════════
       MAIN APP
       ═══════════════════════════════════════════════ */
    const App = () => (
      <div className="h-screen flex flex-col" style={{ fontFamily: "-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro', 'Inter', 'Segoe UI', system-ui, sans-serif" }}>
        <GlobalHeader />
        <NavBar />
        <ListHeader />
        <DataTable />
        <BottomBar />
      </div>
    );

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
