<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscription Principale - Personne Morale</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>

  <script type="text/babel">

    // ============================================================

    // ============================================================

      { id: 'SPEC', title: "SPEC", desc: "Société de Participations d'Expertise Comptable. Structure permettant la détention de titres et l'animation de sociétés d'expertise comptable." },

    const QUALITE_OPTIONS = [
      { id: 'representant_legal', label: 'Représentant légal' },
      { id: 'mandataire', label: 'Mandataire désigné par le(s) associés ou le représentant légal' },
    ];

    const CROEC_OPTIONS = [
      "Auvergne – Rhône-Alpes",
      "Bourgogne – Franche-Comté",
      "Bretagne",
      "Centre – Val de Loire",
      "Corse",
      "Grand Est",
      "Guadeloupe",
      "Guyane",
      "Hauts de France",
      "Île-de-France",
      "Martinique",
      "Mayotte (Comité Départemental de l'Ordre)",
      "Normandie",
      "Nouvelle Aquitaine",
      "Occitanie",
      "Pays de Loire",
      "Provence – Alpes – Côte d'Azur",
      "Réunion",
    ];

    const PAYS_OPTIONS = [
      "Afghanistan", "Afrique du Sud", "Albanie", "Algérie", "Allemagne", "Andorre", "Angola",
      "Antigua-et-Barbuda", "Arabie saoudite", "Argentine", "Arménie", "Australie", "Autriche",
      "Azerbaïdjan", "Bahamas", "Bahreïn", "Bangladesh", "Barbade", "Belgique", "Belize",
      "Bénin", "Bhoutan", "Biélorussie", "Birmanie", "Bolivie", "Bosnie-Herzégovine",
      "Botswana", "Brésil", "Brunei", "Bulgarie", "Burkina Faso", "Burundi", "Cambodge",
      "Cameroun", "Canada", "Cap-Vert", "Centrafrique", "Chili", "Chine", "Chypre", "Colombie",
      "Comores", "Corée du Nord", "Corée du Sud", "Costa Rica", "Côte d'Ivoire", "Croatie",
      "Cuba", "Danemark", "Djibouti", "Dominique", "Égypte", "Émirats arabes unis", "Équateur",
      "Érythrée", "Espagne", "Estonie", "Eswatini", "États-Unis", "Éthiopie", "Fidji",
      "Finlande", "France", "Gabon", "Gambie", "Géorgie", "Ghana", "Grèce", "Grenade",
      "Guatemala", "Guinée", "Guinée équatoriale", "Guinée-Bissau", "Guyana", "Haïti",
      "Honduras", "Hongrie", "Inde", "Indonésie", "Irak", "Iran", "Irlande", "Islande",
      "Israël", "Italie", "Jamaïque", "Japon", "Jordanie", "Kazakhstan", "Kenya", "Kirghizistan",
      "Kiribati", "Koweït", "Laos", "Lesotho", "Lettonie", "Liban", "Liberia", "Libye",
      "Liechtenstein", "Lituanie", "Luxembourg", "Macédoine du Nord", "Madagascar", "Malaisie",
      "Malawi", "Maldives", "Mali", "Malte", "Maroc", "Maurice", "Mauritanie", "Mexique",
      "Micronésie", "Moldavie", "Monaco", "Mongolie", "Monténégro", "Mozambique", "Namibie",
      "Nauru", "Népal", "Nicaragua", "Niger", "Nigeria", "Norvège", "Nouvelle-Zélande", "Oman",
      "Ouganda", "Ouzbékistan", "Pakistan", "Palaos", "Palestine", "Panama", "Papouasie-Nouvelle-Guinée",
      "Paraguay", "Pays-Bas", "Pérou", "Philippines", "Pologne", "Portugal", "Qatar",
      "République dominicaine", "République tchèque", "Roumanie", "Royaume-Uni", "Russie",
      "Rwanda", "Saint-Kitts-et-Nevis", "Saint-Vincent-et-les-Grenadines", "Sainte-Lucie",
      "Salomon", "Salvador", "Samoa", "São Tomé-et-Príncipe", "Sénégal", "Serbie", "Seychelles",
      "Sierra Leone", "Singapour", "Slovaquie", "Slovénie", "Somalie", "Soudan", "Soudan du Sud",
      "Sri Lanka", "Suède", "Suisse", "Suriname", "Syrie", "Tadjikistan", "Tanzanie", "Tchad",
      "Thaïlande", "Timor oriental", "Togo", "Tonga", "Trinité-et-Tobago", "Tunisie",
      "Turkménistan", "Turquie", "Tuvalu", "Ukraine", "Uruguay", "Vanuatu", "Vatican",
      "Venezuela", "Viêt Nam", "Yémen", "Zambie", "Zimbabwe",
    ];

    const PAYS_EXERCICE_UE_EEE = [
      "Allemagne", "Autriche", "Belgique", "Bulgarie", "Chypre", "Croatie",
      "Danemark", "Espagne", "Estonie", "Finlande", "Grèce", "Hongrie",

      "Luxembourg", "Malte", "Pays-Bas", "Norvège", "Pologne", "Portugal",
      "République tchèque", "Roumanie", "Slovaquie", "Slovénie", "Suède",
      "Suisse (uniquement pour les SEL)",
    ];

    const SESSIONS_DATA = [
      { title: "Session 30 octobre 2025", date: new Date(2025, 9, 30) },
      { title: "Session 18 décembre 2025", date: new Date(2025, 11, 18) },
      { title: "Session 5 mars 2026", date: new Date(2026, 2, 5) },
    ];

    const DATE_EFFET_OPTIONS = [
      "Dès la décision du conseil régional",
      "À une date ultérieure",
    ];

    const BASE_STEPS = [
      "Qualité de la PM & CROEC",
      "Dates de sessions",
      "Caractéristiques de la Société et Renseignements Divers",
      "Représentants Légaux",
      "Personne de contact principal",
      "Liste des associés",
      "Liste des bénéficiaires effectifs",
      "Responsable ordinal",
      "Pièces justificatives",
      "Consentement et RGPD",
      "Confirmation et soumission",
    ];

    const EXTRA_STEP = "Représentant légal personne physique du représentant légal personne morale";

    const buildSteps = (hasPM) => {
      if (!hasPM) return BASE_STEPS;
      const steps = [...BASE_STEPS];
      steps.splice(4, 0, EXTRA_STEP); // insert after index 3 ("Représentants Légaux")
      return steps;
    };

    // ============================================================
    // NAVBAR
    // ============================================================
    const Navbar = () => (
      <div style={{ position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100 }}>
        {/* Gradient bar */}
        <div style={{ height: '4px', background: T.gradient }} />
        {/* White bar */}
        <div style={{
          height: '76px',
          background: T.color.white,
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'space-between',
          padding: '0 24px',
          borderBottom: `1px solid ${T.color.border}`,
        }}>
          <div style={{ display: 'flex', flexDirection: 'column' }}>
            <span style={{ fontSize: '16px', fontWeight: 700, color: T.color.primaryRed, lineHeight: '24px' }}>
              Personne Morale
            </span>
            <span style={{ fontSize: '18px', fontWeight: 400, color: T.color.primaryBlue, lineHeight: '27px' }}>
              Inscription Principale
            </span>
          </div>
          <button style={{
            background: 'none', border: 'none', cursor: 'pointer',
            display: 'flex', alignItems: 'center', gap: '6px',
            fontSize: '14px', color: T.color.primaryBlue, fontFamily: T.font,
          }}>
            Abandonner
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.color.primaryBlue} strokeWidth="2.5">
              <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
      </div>
    );

    // ============================================================
    // STEPPER SIDEBAR
    // ============================================================
    const Stepper = ({ currentStep, steps }) => (
      <div style={{
        width: '300px',
        minWidth: '300px',
        padding: '32px 24px',
        background: T.color.white,
        borderRight: `1px solid ${T.color.border}`,
        minHeight: '100%',
      }}>
        {steps.map((label, idx) => {
          const stepNum = idx + 1;
          const isActive = stepNum === currentStep;
          const isCompleted = stepNum < currentStep;
          const isLast = idx === steps.length - 1;

          return (
            <div key={idx} style={{ display: 'flex', position: 'relative' }}>
              {/* Connector line */}
              {!isLast && (
                <div style={{
                  position: 'absolute',
                  left: '11.5px',
                  top: '28px',
                  width: '2px',
                  height: '40px',
                  background: isCompleted ? T.color.primaryRed : T.color.border,
                }} />
              )}
              {/* Circle + Label */}
              <div style={{
                display: 'flex',
                alignItems: 'center',
                gap: '16px',
                paddingBottom: isLast ? 0 : '44px',
                position: 'relative',
                zIndex: 1,
              }}>
                {/* Circle */}
                <div style={{
                  width: '24px',
                  height: '24px',
                  borderRadius: '50%',
                  border: isActive || isCompleted ? 'none' : `2px solid ${T.color.gray}`,
                  background: isActive ? T.color.primaryRed : isCompleted ? T.color.primaryRed : 'transparent',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  flexShrink: 0,
                }}>
                  {isCompleted && (
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.color.white} strokeWidth="3">
                      <polyline points="20 6 9 17 4 12" />
                    </svg>
                  )}
                  {isActive && (
                    <div style={{ width: '8px', height: '8px', borderRadius: '50%', background: T.color.white }} />
                  )}
                </div>
                {/* Label */}
                <span style={{
                  fontSize: '14px',
                  fontWeight: isActive ? 600 : 400,
                  color: isActive ? T.color.textDark : T.color.gray,
                  lineHeight: '20px',
                }}>
                  {label}
                </span>
              </div>
            </div>
          );
        })}
      </div>
    );

    // ============================================================
    // BOTTOM BAR
    // ============================================================
    const BottomBar = ({ canNext, onNext, onPrev, onSave, showPrev, showSave = true }) => (
      <div style={{
        position: 'fixed',
        bottom: 0,
        left: 0,
        right: 0,
        height: '72px',
        background: T.color.white,
        boxShadow: T.shadow.bottomBar,
        display: 'flex',
        alignItems: 'center',
        justifyContent: showPrev && !showSave ? 'flex-end' : 'space-between',
        padding: '0 32px',
        zIndex: 100,
      }}>
        {showSave && (
          <div style={{ display: 'flex', gap: '16px' }}>
            <button onClick={onSave} style={{
              height: '40px', padding: '0 24px',
              border: `1px solid ${T.color.border}`, borderRadius: T.radius,
              background: T.color.white, cursor: 'pointer',
              fontSize: '14px', fontWeight: 500, color: T.color.primaryRed,
              display: 'flex', alignItems: 'center', gap: '8px', fontFamily: T.font,
            }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.color.primaryRed} strokeWidth="2">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                <polyline points="17 21 17 13 7 13 7 21" />
                <polyline points="7 3 7 8 15 8" />
              </svg>
              Enregistrer pour plus tard
            </button>
          </div>
        )}
        <div style={{ display: 'flex', gap: '16px' }}>
          {showPrev && (
            <button onClick={onPrev} style={{
              height: '40px', width: '237px',
              border: 'none', borderRadius: T.radius,
              background: T.color.primaryBlue, cursor: 'pointer',
              fontSize: '14px', fontWeight: 400, color: T.color.white,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              gap: '8px', fontFamily: T.font,
            }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                <polyline points="15 18 9 12 15 6" />
              </svg>
              Précédent
            </button>
          )}
          <button
            onClick={canNext ? onNext : undefined}
            disabled={!canNext}
            style={{
              height: '40px',
              width: '237px',
              border: 'none',
              borderRadius: T.radius,
              background: canNext ? T.color.primaryBlue : T.color.gray,
              cursor: canNext ? 'pointer' : 'not-allowed',
              fontSize: '14px',
              fontWeight: 400,
              color: T.color.white,
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              gap: '8px',
              fontFamily: T.font,
              transition: 'background 0.2s',

              <polyline points="9 18 15 12 9 6" />

          </button>
        </div>

    // ============================================================
    // STEP 1: QUALITÉ DE LA PM & CROEC
    // ============================================================
    const Step1Content = ({ data, update }) => {
      const canShowMandataire = data.qualite === 'mandataire';

      return (
        <div>
          {/* Step header */}
          <div style={{ marginBottom: '32px' }}>
            <h1 style={{ fontSize: '24px', fontWeight: 700, color: T.color.textDark, margin: 0, lineHeight: '28.8px' }}>
              {`Qualité de la PM & CROEC`}
            </h1>
          </div>

          {/* ---- CARD 1: Profil de la société ---- */}
          <div style={{
            background: T.color.white,
            border: `1px solid ${T.color.border}`,
            borderRadius: T.radius,
            boxShadow: T.shadow.card,
            padding: '28px',
            marginBottom: '32px',
          }}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
              {PROFILES.map((p) => {
                const selected = data.profile === p.id;
                return (
                  <div
                    key={p.id}
                    onClick={() => update('profile', p.id)}
                    style={{
                      display: 'flex',
                      alignItems: 'center',
                      justifyContent: 'space-between',
                      padding: '20px 24px',
                      border: `${selected ? '2px' : '1px'} solid ${selected ? T.color.primaryBlue : T.color.border}`,
                      borderRadius: T.radius,
                      cursor: 'pointer',
                      transition: 'all 0.15s ease',
                      background: T.color.white,
                    }}
                  >
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: '14px', fontWeight: 700, color: T.color.textDark, marginBottom: '4px' }}>
                        {p.title}
                      </div>
                      <div style={{ fontSize: '14px', fontWeight: 400, color: T.color.gray }}>
                        {p.desc}
                      </div>
                    </div>
                    {/* Toggle area */}
                    <div style={{
                      width: '52px',
                      height: '52px',
                      borderRadius: T.radius,
                      background: T.color.radioBg,
                      display: 'flex',
                      alignItems: 'center',
                      justifyContent: 'center',
                      marginLeft: '20px',
                      flexShrink: 0,
                    }}>
                      {selected && (
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                          <circle cx="12" cy="12" r="10" fill={T.color.primaryBlue} />
                          <polyline points="8 12 11 15 16 9" fill="none" stroke={T.color.white} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
                        </svg>
                      )}
                      {!selected && (
                        <div style={{
                          width: '24px', height: '24px', borderRadius: '50%',
                          border: `2px solid ${T.color.borderMedium}`, background: T.color.white,
                        }} />
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* ---- CARD 2: Qualité du demandeur ---- */}
          <div style={{
            background: T.color.white,
            border: `1px solid ${T.color.border}`,
            borderRadius: T.radius,
            boxShadow: T.shadow.card,
            padding: '28px',
            marginBottom: '32px',
          }}>
            <h3 style={{ fontSize: '14px', fontWeight: 700, color: T.color.textDark, margin: '0 0 16px 0', lineHeight: '21px' }}>
              Qualité de la personne établissant la demande
            </h3>
            <p style={{ fontSize: '14px', color: T.color.textDark, margin: '0 0 12px 0', lineHeight: '21px' }}>
              <span style={{ color: '#C81E1E' }}>* </span>
              Vous voulez inscrire cette société en qualité de :
            </p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
              {QUALITE_OPTIONS.map((opt) => {
                const selected = data.qualite === opt.id;
                return (
                  <label
                    key={opt.id}
                    onClick={() => update('qualite', opt.id)}
                    style={{
                      display: 'flex',
                      alignItems: 'center',
                      gap: '8px',
                      cursor: 'pointer',
                    }}
                  >
                    {/* Radio circle */}
                    <div style={{
                      width: '20px', height: '20px', borderRadius: '50%', flexShrink: 0,
                      border: `2px solid ${selected ? T.color.primaryBlue : T.color.borderMedium}`,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      transition: 'all 0.15s',
                      background: T.color.white,
                    }}>
                      {selected && (
                        <div style={{ width: '10px', height: '10px', borderRadius: '50%', background: T.color.primaryBlue }} />
                      )}
                    </div>
                    <span style={{ fontSize: '14px', fontWeight: 400, color: T.color.textDark, lineHeight: '14px' }}>
                      {opt.label}
                    </span>
                  </label>
                );
              })}
            </div>

            {/* Conditional Mandataire fields */}
            {canShowMandataire && (
              <div style={{
                marginTop: '24px',
                padding: '24px',
                background: T.color.bg,
                borderRadius: T.radius,
                border: `1px solid ${T.color.border}`,
              }}>
                {/* Info banner */}
                <div style={{
                  padding: '12px 16px',
                  background: T.color.infoBg,
                  border: `1px solid ${T.color.infoBorder}`,
                  borderRadius: T.radius,
                  marginBottom: '24px',
                  display: 'flex', alignItems: 'center', gap: '10px',
                }}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={T.color.infoText} strokeWidth="2">
                    <circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" />
                  </svg>
                  <span style={{ fontSize: '14px', color: T.color.infoText }}>
                    Complétez les informations du mandataire
                  </span>
                </div>

                {/* Row: Nom / Prénom */}
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px', marginBottom: '20px' }}>
                  <FieldInput label="Nom" required value={data.mandataire?.nom} onChange={(v) => update('mandataire.nom', v)} />
                  <FieldInput label="Prénom" required value={data.mandataire?.prenom} onChange={(v) => update('mandataire.prenom', v)} />
                </div>
                {/* Row: Fonction / Téléphone */}
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px', marginBottom: '20px' }}>
                  <FieldInput label="Fonction / Qualité" required value={data.mandataire?.fonction} onChange={(v) => update('mandataire.fonction', v)} />
                  <FieldInput label="Numéro de téléphone" required value={data.mandataire?.telephone} onChange={(v) => update('mandataire.telephone', v)} type="tel" />
                </div>
                {/* Email full width */}
                <div style={{ marginBottom: '24px' }}>
                  <FieldInput label="Adresse mail" required value={data.mandataire?.email} onChange={(v) => update('mandataire.email', v)} type="email" />
                </div>

                {/* Sub-section: Adresse du domicile personnel */}
                <h4 style={{ fontSize: '14px', fontWeight: 700, color: T.color.textDark, margin: '0 0 16px 0' }}>
                  Adresse du domicile personnel
                </h4>
                <AddressBlock data={data.mandataire || {}} onChange={(k, v) => update(`mandataire.${k}`, v)} />
              </div>
            )}
          </div>

          {/* ---- CARD 3: Sélection du CROEC ---- */}
          <div style={{
            background: T.color.white,
            border: `1px solid ${T.color.border}`,
            borderRadius: T.radius,
            boxShadow: T.shadow.card,
            padding: '28px',
            marginBottom: '32px',
          }}>
            <h3 style={{ fontSize: '14px', fontWeight: 700, color: T.color.textDark, margin: '0 0 16px 0', lineHeight: '21px' }}>
              {`Sélection du Conseil Régional de l'Ordre des Experts-Comptables`}
            </h3>
            <FieldSelect
              value={data.croec}
              onChange={(v) => update('croec', v)}
              options={CROEC_OPTIONS}
              placeholder="Sélectionner votre CROEC de rattachement"

      const [viewYear, setViewYear] = useState(today.getFullYear());

      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      // Monday-based: 0=Mon … 6=Sun
      const firstDayRaw = new Date(viewYear, viewMonth, 1).getDay();
      const startDay = firstDayRaw === 0 ? 6 : firstDayRaw - 1;

      const prevMonth = () => {
        if (viewMonth === 0) { setViewMonth(11); setViewYear(viewYear - 1); }
        else setViewMonth(viewMonth - 1);
      };
      const nextMonth = () => {
        if (viewMonth === 11) { setViewMonth(0); setViewYear(viewYear + 1); }
        else setViewMonth(viewMonth + 1);
      };

      const selectDay = (day) => {
        const dd = String(day).padStart(2, '0');
        const mm = String(viewMonth + 1).padStart(2, '0');
        onChange(`${dd}/${mm}/${viewYear}`);
        setOpen(false);
      };

      const isToday = (day) => {
        return day === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear();
      };

      // Parse selected date to highlight
      const selectedParts = (value || '').split('/');
      const isSelected = (day) => {
        if (selectedParts.length !== 3) return false;
        return parseInt(selectedParts[0]) === day && parseInt(selectedParts[1]) === viewMonth + 1 && parseInt(selectedParts[2]) === viewYear;
      };

      // Build grid cells: leading blanks + days + trailing
      const cells = [];
      for (let i = 0; i < startDay; i++) {
        // Previous month's trailing days
        const prevMonthDays = new Date(viewYear, viewMonth, 0).getDate();
        cells.push({ day: prevMonthDays - startDay + 1 + i, current: false });
      }
      for (let d = 1; d <= daysInMonth; d++) {
        cells.push({ day: d, current: true });
      }
      const remaining = 42 - cells.length;
      for (let i = 1; i <= remaining; i++) {
        cells.push({ day: i, current: false });
      }

              borderRadius: T.radius, boxShadow: T.shadow.card,
              padding: '16px', width: '300px',
            }}>

              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '12px' }}>
                <button onClick={() => { if (yearPickerOpen) { setYearPickerOpen(false); } prevMonth(); }} style={{
                  background: 'none', border: 'none', cursor: 'pointer', fontSize: '16px',
                  color: T.color.gray, padding: '4px 8px', fontFamily: T.font,
                }}>&lt;</button>
                <div style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                  <span style={{ fontSize: '14px', fontWeight: 600, color: T.color.textDark }}>
                    {MOIS[viewMonth]}
                  </span>
                  <span
                    onClick={() => setYearPickerOpen(!yearPickerOpen)}
                    style={{
                      fontSize: '14px', fontWeight: 600, color: T.color.primaryBlue,
                      cursor: 'pointer', textDecoration: 'underline', textUnderlineOffset: '2px',
                    }}
                  >
                    {viewYear}
                  </span>
                </div>
                <button onClick={() => { if (yearPickerOpen) { setYearPickerOpen(false); } nextMonth(); }} style={{
                  background: 'none', border: 'none', cursor: 'pointer', fontSize: '16px',
                  color: T.color.gray, padding: '4px 8px', fontFamily: T.font,
                }}>&gt;</button>
              </div>

              {/* Year picker grid */}
              {yearPickerOpen && (
                <div ref={yearListRef} style={{
                  display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '6px',
                  marginBottom: '12px', maxHeight: '180px', overflowY: 'auto',
                  padding: '4px',
                }}>
                  {Array.from({ length: 30 }, (_, i) => today.getFullYear() - 25 + i).map(y => (
                    <div
                      key={y}
                      onClick={() => { setViewYear(y); setYearPickerOpen(false); }}
                      style={{
                        textAlign: 'center', padding: '8px 4px', fontSize: '13px',
                        fontFamily: T.font, cursor: 'pointer', borderRadius: T.radius,
                        fontWeight: y === viewYear ? 700 : 400,
                        color: y === viewYear ? T.color.white : T.color.textDark,
                        background: y === viewYear ? T.color.primaryBlue : 'transparent',
                        transition: 'background 0.1s',
                      }}
                      onMouseEnter={e => { if (y !== viewYear) e.currentTarget.style.background = T.color.radioBg; }}
                      onMouseLeave={e => { if (y !== viewYear) e.currentTarget.style.background = 'transparent'; }}
                    >
                      {y}
                    </div>
                  ))}
                </div>
              )}

              {/* Day headers */}
              {!yearPickerOpen && (
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '2px', marginBottom: '4px' }}>

              {/* Day cells */}
              {!yearPickerOpen && (
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '2px' }}>

                    <div

                        transition: 'all 0.1s',
                      }}
                    >
                      {c.day}
                    </div>

              </div>

            </div>

      const montant = d.capitalMontant || '';
      const titres = d.capitalTitres || '';
      const valeur = d.capitalValeurNominale || '';
      const voix = d.capitalVoix || '';

      const errMontant = montant && !isInteger(montant) ? 'Le montant doit être un nombre entier, sans décimales.' : '';
      const errTitres = titres && !isInteger(titres) ? 'Le nombre de titres doit être un nombre entier.' : '';
      const errValeur = valeur && !isDecimal2(valeur) ? 'La valeur nominale doit être un nombre avec 2 décimales maximum (ex : 10,50).' : '';
      const errVoix = voix && !isInteger(voix) ? 'Le nombre total de voix doit être un nombre entier.' : '';

      // Cross-field: Nb titres × Valeur nominale == Montant
      const crossCheck = titres && valeur && montant && !errMontant && !errTitres && !errValeur;
      const calcul = crossCheck ? parseNum(titres) * parseNum(valeur) : null;
      const montantNum = crossCheck ? parseNum(montant) : null;
      const errCross = crossCheck && Math.abs(calcul - montantNum) > 0.01
        ? `Incohérence : Nombre de titres (${titres}) × Valeur nominale (${valeur}) = ${calcul.toFixed(2)} €, mais le montant saisi est ${montant} €.`
        : '';

      return (
        <SectionCard>
          <SectionTitle>Capital Social</SectionTitle>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px', marginBottom: '20px' }}>
            <div>
              <FieldInput label="Montant (en euros)" required value={montant} onChange={v => update('capitalMontant', v)} placeholder="0" />
              {errMontant && <p style={errStyle}>{errMontant}</p>}
            </div>
            <div>
              <FieldInput label="Nombre de titres" required value={titres} onChange={v => update('capitalTitres', v)} />
              {errTitres && <p style={errStyle}>{errTitres}</p>}
            </div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px' }}>
            <div>
              <FieldInput label="Valeur nominale des titres (en euros)" required value={valeur} onChange={v => update('capitalValeurNominale', v)} />
              {errValeur && <p style={errStyle}>{errValeur}</p>}
            </div>
            <div>
              <FieldInput label="Nombre de voix (Total des droits de vote)" required value={voix} onChange={v => update('capitalVoix', v)} />
              {errVoix && <p style={errStyle}>{errVoix}</p>}
            </div>
          </div>
          {errCross && (
            <div style={{
              marginTop: '16px', padding: '12px 16px',
              background: T.color.redBg, border: `1px solid #FECACA`,
              borderRadius: T.radius,
            }}>
              <p style={{ fontSize: '13px', color: '#991B1B', margin: 0, lineHeight: '18px' }}>{errCross}</p>
            </div>
          )}
        </SectionCard>
      );
    };

    const Step3Content = ({ data, update, profile }) => {
      const d = data || {};
      const formesJuridiques = profile === 'SPFPL' ? FORMES_JURIDIQUES_SPFPL : FORMES_JURIDIQUES_DEFAULT;
      const toggleObjet = (obj) => {
        const current = d.objetsSociaux || [];
        if (current.includes(obj)) {
          update('objetsSociaux', current.filter(o => o !== obj));
        } else {
          update('objetsSociaux', [...current, obj]);
        }
      };

      return (
        <div>
          {/* Step header */}
          <div style={{ marginBottom: '48px' }}>
            <h1 style={{ fontSize: '24px', fontWeight: 700, color: T.color.textDark, margin: 0, lineHeight: '24px' }}>
              Caractéristiques de la Société et Renseignements Divers
            </h1>
          </div>

          {/* ---- CARD 1: Identité & Objet social ---- */}
          <SectionCard>
            {/* Dénomination / Sigle */}
            <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: '20px', marginBottom: '20px' }}>
              <FieldInput label="Dénomination sociale" required value={d.denomination} onChange={v => update('denomination', v)} />
              <FieldInput label="Sigle" value={d.sigle} onChange={v => update('sigle', v)} />
            </div>

            {/* Objet social — conditionnel selon le profil */}
            {profile !== 'SPFPL' && (
              <div style={{ marginBottom: '20px' }}>
                <p style={{ fontSize: '14px', color: T.color.textDark, margin: '0 0 12px 0', fontWeight: 400 }}>
                  Objet social de la société
                </p>

                {/* SEC = choix unique (radio) */}
                {profile === 'SEC' && (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                    {OBJETS_SOCIAUX_SEC.map(obj => (
                      <label key={obj} style={{ display: 'flex', alignItems: 'center', gap: '10px', cursor: 'pointer' }}>
                        <div style={{
                          width: '20px', height: '20px', borderRadius: '50%',
                          border: `2px solid ${d.objetSocial === obj ? T.color.primaryBlue : T.color.borderMedium}`,
                          display: 'flex', alignItems: 'center', justifyContent: 'center',
                          background: T.color.white, flexShrink: 0,
                        }} onClick={() => update('objetSocial', obj)}>
                          {d.objetSocial === obj && (
                            <div style={{ width: '10px', height: '10px', borderRadius: '50%', background: T.color.primaryBlue }} />
                          )}
                        </div>
                        <span style={{ fontSize: '14px', color: T.color.textDark }}>{obj}</span>
                      </label>
                    ))}
                  </div>
                )}

                {/* SPEC = saisie libre */}
                {profile === 'SPEC' && (
                  <FieldInput label="" value={d.objetSocialLibre} onChange={v => update('objetSocialLibre', v)} placeholder="Précisez l'objet social" />
                )}

                {/* SPE = choix multiple (checkboxes) */}
                {profile === 'SPE' && (
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '12px' }}>
                    {OBJETS_SOCIAUX_SPE.map(obj => (
                      <CheckboxItem key={obj} label={obj} checked={(d.objetsSociaux || []).includes(obj)} onChange={() => toggleObjet(obj)} />
                    ))}
                  </div>
                )}

                {/* Pas de profil sélectionné — affichage par défaut (checkboxes SPE) */}
                {!profile && (
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '12px' }}>
                    {OBJETS_SOCIAUX_SPE.map(obj => (
                      <CheckboxItem key={obj} label={obj} checked={(d.objetsSociaux || []).includes(obj)} onChange={() => toggleObjet(obj)} />
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* CRCC — conditionnel si commissariat aux comptes sélectionné */}
            {(d.objetSocial === 'Expert comptable et commissariat aux comptes' || (d.objetsSociaux || []).includes('Commissaire aux comptes')) && (
              <div style={{ marginBottom: '20px' }}>
                <FieldSelect label="Choisir la liste sur laquelle la société est inscrite ou va s'inscrire" required value={d.crcc} onChange={v => update('crcc', v)} options={CRCC_OPTIONS} placeholder="Sélectionner" />
              </div>
            )}

            {/* Forme juridique */}
            <div style={{ marginBottom: d.formeJuridique === 'Autre' ? '20px' : '0' }}>
              <FieldSelect label="Forme juridique de la société" required value={d.formeJuridique} onChange={v => { update('formeJuridique', v); if (v !== 'Autre') update('formeJuridiqueAutre', ''); }} options={formesJuridiques} placeholder="Sélectionner" height="40px" />
            </div>
            {d.formeJuridique === 'Autre' && (
              <FieldInput label="Autre - précisez" required value={d.formeJuridiqueAutre} onChange={v => update('formeJuridiqueAutre', v)} />
            )}
          </SectionCard>

          {/* ---- CARD 2: Capital Social ---- */}
          <CapitalSocialCard data={d} update={update} />

          {/* ---- CARD 3: Siège social ---- */}
          <SectionCard>
            <SectionTitle>Siège social</SectionTitle>
            <AddressBlock data={d} onChange={(k, v) => update(k, v)} prefix="siege" />
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '20px' }}>
              <FieldInput label="Téléphone" required value={d.siegeTelephone} onChange={v => update('siegeTelephone', v)} />
              <FieldInput label="Email de la société" value={d.siegeEmail} onChange={v => update('siegeEmail', v)} />
              <FieldInput label="Adresse site internet" value={d.siegeWebsite} onChange={v => update('siegeWebsite', v)} />
            </div>
          </SectionCard>

          {/* ---- CARD: Entreprise mère ---- */}
          <SectionCard>
            <SectionTitle>Entreprise mère</SectionTitle>
            <OuiNon
              label="Cette société est-elle liée à une entreprise mère (différente du siège social) ?"
              value={d.entrepriseMere}
              onChange={v => { update('entrepriseMere', v); if (v === 'Non') { update('emRecherche', ''); update('emFound', false); } }}
            />
            {d.entrepriseMere === 'Oui' && (
              <div>
                <SocieteSearchAutocomplete
                  searchMode={d.emSearchMode}
                  selectedLabel={d.emSelectedLabel}
                  onSelectSociete={(societe) => {
                    update('emSearchMode', 'selected');
                    update('emSelectedLabel', `${societe.siren} - ${societe.denomination}`);
                    update('emDenomination', societe.denomination);
                    update('emSiren', societe.siren);
                    update('emRue', societe.rue);
                    update('emComplement', societe.complement);
                    update('emLieuDit', societe.lieuDit);
                    update('emCodePostal', societe.codePostal);
                    update('emVille', societe.ville);
                    update('emPays', societe.pays);
                  }}
                  onManual={() => {
                    update('emSearchMode', 'manual');
                    update('emSelectedLabel', '+ Renseigner manuellement');
                    update('emDenomination', ''); update('emSiren', '');
                    update('emRue', ''); update('emComplement', '');
                    update('emLieuDit', ''); update('emCodePostal', '');
                    update('emVille', ''); update('emPays', '');
                  }}
                  onClear={() => {
                    update('emSearchMode', null); update('emSelectedLabel', '');
                    update('emDenomination', ''); update('emSiren', '');
                    update('emRue', ''); update('emComplement', '');
                    update('emLieuDit', ''); update('emCodePostal', '');
                    update('emVille', ''); update('emPays', '');
                  }}
                />

                {/* Mode sélection : mêmes champs que manuel, pré-remplis en lecture seule */}
                {d.emSearchMode === 'selected' && (
                  <div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px', marginBottom: '16px' }}>
                      <ReadOnlyField label="Dénomination sociale" required value={d.emDenomination} />
                      <ReadOnlyField label="SIREN (ou équivalent européen)" required value={d.emSiren} />
                    </div>
                    <div style={{ marginBottom: '16px' }}>
                      <ReadOnlyField label="Rue" required value={d.emRue} />
                    </div>
                    <div style={{ marginBottom: '16px' }}>
                      <ReadOnlyField label="Complément d'adresse" value={d.emComplement} />
                    </div>
                    <div style={{ marginBottom: '16px' }}>
                      <ReadOnlyField label="Lieu-dit" value={d.emLieuDit} />
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '16px' }}>
                      <ReadOnlyField label="Code postal" required value={d.emCodePostal} />
                      <ReadOnlyField label="Ville" required value={d.emVille} />
                    </div>
                    <div style={{ marginBottom: '16px' }}>
                      <ReadOnlyField label="Pays" required value={d.emPays} />
                    </div>
                  </div>
                )}

                {/* Mode manuel : champs éditables */}
                {d.emSearchMode === 'manual' && (
                  <div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px', marginBottom: '20px' }}>
                      <FieldInput label="Dénomination sociale" required value={d.emDenomination} onChange={v => update('emDenomination', v)} />
                      <FieldInput label="SIREN (ou équivalent européen)" required value={d.emSiren} onChange={v => update('emSiren', v)} />
                    </div>
                    <AddressBlock data={d} onChange={(k, v) => update(k, v)} prefix="em" />
                  </div>
                )}
              </div>
            )}
          </SectionCard>

          {/* ---- CARD 4: Tiers de confiance (SEC ou SPE uniquement) ---- */}
          {(profile === 'SEC' || profile === 'SPE') && <SectionCard>
            <SectionTitle>Tiers de confiance</SectionTitle>
            <OuiNon
              label="La société adoptera-t-elle le statut de tiers de confiance ?"
              required
              value={d.tiersConfiance}
              onChange={v => update('tiersConfiance', v)}
            />
            {d.tiersConfiance === 'Oui' && (
              <div style={{
                padding: '16px',
                background: T.color.infoBg,
                border: `1px solid ${T.color.infoBorder}`,
                borderRadius: T.radius,
                marginTop: '8px',
              }}>
                <p style={{ fontSize: '14px', color: T.color.infoText, margin: 0, lineHeight: '21px' }}>
                  {`Afin d'obtenir le statut de Tiers de confiance, vous devrez souscrire une convention avec l'administration fiscale (demande de convention individuelle à faire auprès de la DRFIP). Cette convention devra être déposée dès sa signature sur la PEP, pour que vous fassiez partie de la liste des Tiers de confiance publiée sur le site du Conseil national de l'Ordre.`}
                </p>
              </div>
            )}
          </SectionCard>}

          {/* ---- SECTION: Renseignements divers ---- */}
          <div style={{ marginBottom: '32px' }}>
            <h2 style={{ fontSize: '24px', fontWeight: 700, color: T.color.textDark, margin: '0 0 32px 0', lineHeight: '28.8px' }}>
              Renseignements divers
            </h2>

            {/* Origine de la société */}
            <SectionCard>
              <SectionTitle>Origine de la société</SectionTitle>

              <OuiNon
                label={`S'agit-il d'une société déjà immatriculée au RNE ?`}
                required
                value={d.immatriculeeRNE}
                onChange={v => update('immatriculeeRNE', v)}
              />

              {d.immatriculeeRNE === 'Oui' && (
                <div style={{ marginBottom: '20px' }}>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '20px', marginBottom: '20px' }}>
                    <FieldInput label="SIRET du siège social" required value={d.siret} onChange={v => update('siret', v)} />
                    <FieldInput label="N° de TVA intracommunautaire" required value={d.tvaIntra} onChange={v => update('tvaIntra', v)} />
                    <div>
                      <label style={{ display: 'block', fontSize: '14px', fontWeight: 500, marginBottom: '6px', color: T.color.textDark }}>
                        <span style={{ color: '#C81E1E', marginRight: '3px' }}>*</span>Date de création de la société
                      </label>
                      <DatePicker value={d.dateCreation} onChange={v => update('dateCreation', v)} placeholder="Sélectionner une date" />
                    </div>
                  </div>

                  <OuiNon
                    label="A-t-elle changé d'appellation ?"
                    required
                    value={d.changementAppellation}
                    onChange={v => update('changementAppellation', v)}
                  />
                  {d.changementAppellation === 'Oui' && (
                    <div style={{ marginBottom: '20px' }}>
                      <FieldInput label="Ancienne appellation" required value={d.ancienneAppellation} onChange={v => update('ancienneAppellation', v)} />
                    </div>
                  )}

                  <div style={{ marginBottom: '20px' }}>
                    <FieldInput label="Quel est ou était son objet social d'origine ?" required value={d.objetOrigine} onChange={v => update('objetOrigine', v)} />
                  </div>

                  <OuiNon
                    label="A-t-elle exercé l'activité prévue dans son objet d'origine ?"
                    required
                    value={d.activiteOrigine}
                    onChange={v => update('activiteOrigine', v)}
                  />
                  {d.activiteOrigine === 'Oui' && (
                    <div style={{ marginBottom: '20px' }}>
                      <FieldInput label="Si oui, qu'est devenue ou deviendra cette activité après son inscription au tableau de l'ordre ?" required value={d.devenirActivite} onChange={v => update('devenirActivite', v)} />
                    </div>
                  )}
                </div>
              )}

            </SectionCard>

            {/* Origine de la clientèle */}
            <SectionCard>
              <SectionTitle>Origine de la clientèle présente ou future</SectionTitle>
              <OuiNon
                label="La société est-elle constituée pour racheter une clientèle ou reprendre une activité dans l'année qui suit sa création ?"
                required
                value={d.rachatClientele}
                onChange={v => update('rachatClientele', v)}
              />
              {d.rachatClientele === 'Oui' && (
                <div style={{ marginBottom: '20px' }}>
                  <FieldInput label="Identité du cédant" value={d.identiteCedant} onChange={v => update('identiteCedant', v)} />
                </div>
              )}
            </SectionCard>

            {/* Organisation - Effectif */}
            <SectionCard>
              <SectionTitle>Organisation - Effectif prévisionnel à 6 mois</SectionTitle>
              <p style={{ fontSize: '14px', fontWeight: 600, color: T.color.textDark, margin: '0 0 8px 0' }}>
                {`Experts-comptables inscrits ou en cours d'inscription`}
              </p>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px', marginBottom: '20px' }}>
                <FieldInput label="Nombre" value={d.ecInscritsNombre} onChange={v => { if (v === '' || /^\d+$/.test(v)) update('ecInscritsNombre', v); }} />
                <FieldInput label="Équivalent temps plein" value={d.ecInscritsETP} onChange={v => { if (v === '' || /^\d+$/.test(v)) update('ecInscritsETP', v); }} />
              </div>
              <p style={{ fontSize: '14px', fontWeight: 600, color: T.color.textDark, margin: '0 0 8px 0' }}>
                Experts-comptables stagiaires
              </p>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px', marginBottom: '20px' }}>
                <FieldInput label="Nombre" value={d.ecStagiairesNombre} onChange={v => { if (v === '' || /^\d+$/.test(v)) update('ecStagiairesNombre', v); }} />
                <FieldInput label="Équivalent temps plein" value={d.ecStagiairesETP} onChange={v => { if (v === '' || /^\d+$/.test(v)) update('ecStagiairesETP', v); }} />
              </div>
              <p style={{ fontSize: '14px', fontWeight: 600, color: T.color.textDark, margin: '0 0 8px 0' }}>
                Autres personnels
              </p>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px', marginBottom: '20px' }}>
                <FieldInput label="Nombre" value={d.autresNombre} onChange={v => { if (v === '' || /^\d+$/.test(v)) update('autresNombre', v); }} />
                <FieldInput label="Équivalent temps plein" value={d.autresETP} onChange={v => { if (v === '' || /^\d+$/.test(v)) update('autresETP', v); }} />
              </div>
              <p style={{ fontSize: '14px', fontWeight: 700, color: T.color.textDark, margin: '0 0 8px 0' }}>
                Total
              </p>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px' }}>
                <div>
                  <label style={{ display: 'block', fontSize: '14px', fontWeight: 500, marginBottom: '6px', color: T.color.textDark }}>Nombre</label>
                  <div style={{
                    width: '100%', height: '40px', border: `1px solid ${T.color.border}`, borderRadius: T.radius,
                    padding: '0 14px', fontSize: '14px', color: T.color.primaryRed, background: T.color.bg,
                    display: 'flex', alignItems: 'center',
                  }}>
                    {(parseInt(d.ecInscritsNombre||0) + parseInt(d.ecStagiairesNombre||0) + parseInt(d.autresNombre||0)) || 0}
                  </div>
                </div>
                <div>
                  <label style={{ display: 'block', fontSize: '14px', fontWeight: 500, marginBottom: '6px', color: T.color.textDark }}>Équivalent temps plein</label>
                  <div style={{
                    width: '100%', height: '40px', border: `1px solid ${T.color.border}`, borderRadius: T.radius,
                    padding: '0 14px', fontSize: '14px', color: T.color.primaryRed, background: T.color.bg,
                    display: 'flex', alignItems: 'center',
                  }}>
                    {(parseFloat(d.ecInscritsETP||0) + parseFloat(d.ecStagiairesETP||0) + parseFloat(d.autresETP||0)) || 0}
                  </div>
                </div>
              </div>
            </SectionCard>

            {/* Organisation - Locaux professionnels */}
            <SectionCard>
              <SectionTitle>Organisation - Locaux professionnels</SectionTitle>
              <FieldSelect
                label="Les locaux utilisés par la personne morale sont ils"
                required
                value={d.locaux}
                onChange={v => update('locaux', v)}
                options={LOCAUX_OPTIONS}
                placeholder="Sélectionner"
                height="40px"
              />
            </SectionCard>
          </div>
        </div>
      );
    };

    // ── Reusable Address Block ──
    const AddressBlock = ({ data, onChange, prefix }) => {
      const pfx = (k) => prefix ? `${prefix}${k.charAt(0).toUpperCase()}${k.slice(1)}` : k;
      const val = (k) => data[pfx(k)] || '';
      const set = (k, v) => onChange(pfx(k), v);
      return (
        <>
          <div style={{ marginBottom: '16px' }}>
            <label style={{ display: 'block', fontSize: '14px', fontWeight: 500, marginBottom: '6px', color: T.color.textDark }}>
              Recherche adresse
            </label>
            <input
              placeholder="Saisissez une adresse..."
              style={{
                width: '100%', height: '40px', border: `1px solid ${T.color.border}`, borderRadius: T.radius,
                padding: '0 14px', fontSize: '14px', color: T.color.textDark, fontFamily: T.font,
                background: T.color.white, outline: 'none',
              }}
            />
          </div>
          <div style={{ marginBottom: '16px' }}>
            <FieldInput label="Rue" required value={val('rue')} onChange={v => set('rue', v)} />
          </div>
          <div style={{ marginBottom: '16px' }}>
            <FieldInput label="Complément d'adresse" value={val('complement')} onChange={v => set('complement', v)} />
          </div>
          <div style={{ marginBottom: '16px' }}>
            <FieldInput label="Lieu-dit" value={val('lieuDit')} onChange={v => set('lieuDit', v)} />
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '16px' }}>
            <FieldInput label="Code postal" required value={val('codePostal')} onChange={v => set('codePostal', v)} />
            <FieldInput label="Ville" required value={val('ville')} onChange={v => set('ville', v)} />
          </div>
          <div style={{ marginBottom: '16px' }}>
            <FieldSelect label="Pays" required value={val('pays') || 'France'} onChange={v => set('pays', v)} options={PAYS_OPTIONS} placeholder="Sélectionner" />
          </div>
        </>
      );
    };

    // ============================================================
    // STEP 4: REPRÉSENTANTS LÉGAUX
    // ============================================================
    const CIVILITE_OPTIONS = ["Madame", "Monsieur"];

    const STATUT_OPTIONS = [
      "Gérant",
      "Président",
      "Président du conseil d'administration",
      "Président du directoire",
      "Président du conseil de surveillance",
      "Directeur général",
      "Directeur général délégué",
    ];

    // Search bar with tag result (kept for PM search)
    const SearchBar = ({ placeholder, value, onClear }) => (
      <div style={{ marginBottom: '16px' }}>
        <div style={{
          display: 'flex', alignItems: 'center', gap: '8px',
          border: `1px solid ${T.color.border}`, borderRadius: T.radius,
          padding: '0 14px', height: '40px', background: T.color.white,
        }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.color.gray} strokeWidth="2">
            <circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            placeholder={placeholder}
            value={value || ''}
            readOnly
            style={{
              flex: 1, border: 'none', outline: 'none', fontSize: '14px',
              color: T.color.textDark, background: 'transparent', fontFamily: T.font,
            }}
          />
        </div>
        {value && (

                        const next = ppParticipations.filter((_, i) => i !== idx);
                        updatePP('participations', next);
                      }}
                    />

                    <div style={{ marginTop: '16px' }}>
                      <OuiNon
                        label="Ce représentant légal est-il un bénéficiaire effectif au sens de l'article R561-1 du code monétaire et financier de la société en cours d'inscription ?"
                        required
                        value={pp.beneficiaire}
                        onChange={v => updatePP('beneficiaire', v)}
                      />
                    </div>

                    {pp.beneficiaire === 'Oui' && (
                      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '16px' }}>
                        <div>
                          <label style={{ display: 'block', fontSize: '14px', fontWeight: 500, marginBottom: '6px', color: T.color.textDark }}>
                            <span style={{ color: '#C81E1E', marginRight: '3px' }}>*</span>Date de Naissance
                          </label>
                          <DatePicker value={pp.dateNaissance} onChange={v => updatePP('dateNaissance', v)} />
                        </div>
                        <FieldSelect label="Lieu de naissance" required value={pp.lieuNaissance} onChange={v => updatePP('lieuNaissance', v)} options={CROEC_OPTIONS} placeholder="Sélectionner" />
                      </div>
                    )}
                  </>
                )}
              </SectionCard>

              {/* PCP-specific questions */}
              <SectionCard>
                {/* Fonction */}
                <div style={{ marginBottom: '16px' }}>
                  <FieldSelect
                    label="Quelle est la fonction de cette personne au sein de la société en cours d'inscription ?"
                    required
                    value={d.fonctionPCP}
                    onChange={v => u('fonctionPCP', v)}
                    options={FONCTION_PCP_OPTIONS}
                    placeholder="Sélectionner"
                  />
                </div>

                {/* Associée PCP */}
                <OuiNon
                  label="Cette personne est-elle ou sera t-elle associée au sein de la société en cours d'inscription ?"
                  required
                  value={d.pcpAssociee}
                  onChange={v => u('pcpAssociee', v)}
                />

                {/* Conditional: pcpAssociée = Oui → Participation */}
                {pcpAssocieeOui && (
                  <ParticipationSection
                    items={pcpParticipations}
                    onAdd={() => u('pcpParticipations', [...pcpParticipations, {}])}
                    onUpdate={(idx, newData) => {
                      const next = [...pcpParticipations];
                      next[idx] = newData;
                      u('pcpParticipations', next);
                    }}
                    onRemove={idx => {
                      const next = pcpParticipations.filter((_, i) => i !== idx);
                      u('pcpParticipations', next);
                    }}
                  />
                )}

                {/* Bénéficiaire PCP */}
                <div style={{ marginTop: '16px' }}>
                  <OuiNon
                    label="Cette personne de contact principal est-elle un bénéficiaire effectif au sens de l'article R561-1 du code monétaire et financier de la société en cours d'inscription ?"
                    required
                    value={d.pcpBeneficiaire}
                    onChange={v => u('pcpBeneficiaire', v)}
                  />
                </div>

                {d.pcpBeneficiaire === 'Oui' && (
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '16px' }}>
                    <div>
                      <label style={{ display: 'block', fontSize: '14px', fontWeight: 500, marginBottom: '6px', color: T.color.textDark }}>
                        <span style={{ color: '#C81E1E', marginRight: '3px' }}>*</span>Date de Naissance
                      </label>
                      <DatePicker value={d.pcpDateNaissance} onChange={v => u('pcpDateNaissance', v)} />
                    </div>
                    <FieldSelect label="Lieu de naissance" required value={d.pcpLieuNaissance} onChange={v => u('pcpLieuNaissance', v)} options={CROEC_OPTIONS} placeholder="Sélectionner" />
                  </div>
                )}
              </SectionCard>
            </>
          )}
        </div>
      );
    };

    // ============================================================
    // Step: Liste des associés
    // ============================================================
    const ASSOCIES_DATA = [
      { nom: 'A', capNombre: '4 000', capPct: '34,78%', voteNombre: '7 500', votePct: '40,54%', type: 'ec' },
      { nom: 'B', capNombre: '2 500', capPct: '21,74%', voteNombre: '5 000', votePct: '27,03%', type: 'ec' },
      { nom: 'PM1', capNombre: '700', capPct: '6,09%', voteNombre: '1 200', votePct: '6,49%', type: 'ec' },
      { nom: 'D', capNombre: '400', capPct: '3,48%', voteNombre: '700', votePct: '3,78%', type: 'ec' },
      { nom: 'PM2', capNombre: '200', capPct: '1,74%', voteNombre: '400', votePct: '2,16%', type: 'ec' },
      { nom: 'E', capNombre: '2 200', capPct: '19,13%', voteNombre: '2 200', votePct: '11,89%', type: 'nonec' },
      { nom: 'F', capNombre: '700', capPct: '6,09%', voteNombre: '700', votePct: '3,78%', type: 'nonec' },
      { nom: 'G', capNombre: '200', capPct: '1,74%', voteNombre: '200', votePct: '1,08%', type: 'nonec' },
      { nom: 'H', capNombre: '100', capPct: '0,87%', voteNombre: '100', votePct: '0,54%', type: 'nonec' },
      { nom: 'PM3', capNombre: '500', capPct: '4,35%', voteNombre: '500', votePct: '2,70%', type: 'nonec' },
    ];

    const StepAssociesContent = () => {
      const ecRows = ASSOCIES_DATA.filter(r => r.type === 'ec');
      const nonEcRows = ASSOCIES_DATA.filter(r => r.type === 'nonec');

      const bdr = `1px solid ${T.color.border}`;
      const bdrV = `1px solid ${T.color.border}`;
      const fs = '14px';

      // Data cell
      const cell = {
        padding: '11px 16px', fontSize: fs, color: T.color.textDark,
        borderBottom: bdr, fontFamily: T.font, lineHeight: '20px',
      };
      const cellR = { ...cell, textAlign: 'right', fontVariantNumeric: 'tabular-nums' };

      // Header group (Participation / Droits de vote)
      const hGroup = {
        padding: '12px 16px', fontSize: fs, fontWeight: 700, textAlign: 'center',
        lineHeight: '20px', fontFamily: T.font,
        borderBottom: bdr, background: T.color.white,
      };

      // Sub-header (Nombre / %)
      const hSub = {
        padding: '9px 16px', fontSize: fs, fontWeight: 600, textAlign: 'center',
        color: T.color.gray, borderBottom: bdr, background: T.color.white,
        fontFamily: T.font, lineHeight: '20px',
      };

      // Sub-total row
      const sub = {
        padding: '11px 16px', fontSize: fs, fontWeight: 700, color: T.color.primaryRed,
        background: T.color.redBg, borderBottom: bdr, fontFamily: T.font, lineHeight: '20px',
      };
      const subR = { ...sub, textAlign: 'right', fontVariantNumeric: 'tabular-nums' };

      // Total row
      const tot = {
        padding: '11px 16px', fontSize: fs, fontWeight: 700, color: T.color.white,
        background: T.color.primaryBlue, borderBottom: 'none', fontFamily: T.font, lineHeight: '20px',
      };
      const totR = { ...tot, textAlign: 'right', fontVariantNumeric: 'tabular-nums' };

      // Empty/spacer row
      const emp = {
        padding: '9px 16px', fontSize: fs, color: T.color.gray,
        borderBottom: bdr, fontFamily: T.font, background: T.color.white, lineHeight: '20px',
      };
      const empR = { ...emp, textAlign: 'right', fontVariantNumeric: 'tabular-nums' };

      const renderRow = (r, idx) => (
        <tr key={idx}>
          <td style={{ ...cell, fontWeight: 500, borderRight: bdrV }}>{r.nom}</td>
          <td style={cellR}>{r.capNombre}</td>
          <td style={{ ...cellR, borderRight: bdrV }}>{r.capPct}</td>
          <td style={cellR}>{r.voteNombre}</td>
          <td style={cellR}>{r.votePct}</td>
        </tr>
      );

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '24px' }}>
          <h2 style={{ fontSize: '24px', fontWeight: 700, color: T.color.textDark, margin: 0, lineHeight: '1.3' }}>
            Liste des associés
          </h2>
          <p style={{ fontSize: '14px', fontWeight: 700, color: T.color.primaryRed, margin: 0 }}>
            Détention en capital et en droits de vote
          </p>

          <div style={{
            background: T.color.white, borderRadius: T.radius, overflow: 'hidden',
            boxShadow: T.shadow.card, border: bdr,
          }}>
            <table style={{ width: '100%', borderCollapse: 'collapse' }}>
              <thead>
                <tr style={{ borderBottom: bdr }}>
                  <th rowSpan="2" style={{ ...hGroup, textAlign: 'left', width: '28%', borderRight: bdrV, borderBottom: bdr, verticalAlign: 'bottom', paddingBottom: '9px' }}>
                    <span style={{ fontSize: fs, color: T.color.textDark }}>Nom Prénom</span><br/>
                    <span style={{ fontWeight: 400, fontSize: fs, color: T.color.gray }}>ou</span>
                  </th>
                  <th colSpan="2" style={{ ...hGroup, color: T.color.primaryBlue, borderRight: bdrV, borderBottom: bdr }}>
                    Participation<br/>au capital
                  </th>
                  <th colSpan="2" style={{ ...hGroup, color: T.color.primaryRed, borderBottom: bdr }}>
                    Droits de vote
                  </th>
                </tr>
                <tr>
                  <th style={{ ...hSub }}>Nombre</th>
                  <th style={{ ...hSub, borderRight: bdrV }}>%</th>
                  <th style={{ ...hSub }}>Nombre</th>
                  <th style={{ ...hSub }}>%</th>
                </tr>
              </thead>
              <tbody>
                {ecRows.map(renderRow)}
                <tr>
                  <td style={{ ...sub, borderRight: bdrV }}>Sous-total EC</td>
                  <td style={subR}>7 800</td>
                  <td style={{ ...subR, borderRight: bdrV }}>67,83%</td>
                  <td style={subR}>14 800</td>
                  <td style={subR}>80,00%</td>
                </tr>
                {nonEcRows.map(renderRow)}
                <tr>
                  <td style={{ ...sub, borderRight: bdrV }}>Sous-total non EC</td>
                  <td style={subR}>3 700</td>
                  <td style={{ ...subR, borderRight: bdrV }}>32,17%</td>
                  <td style={subR}>3 700</td>
                  <td style={subR}>20,00%</td>
                </tr>
                <tr>
                  <td style={{ ...emp, borderRight: bdrV }}></td>
                  <td style={empR}>0</td>
                  <td style={{ ...empR, borderRight: bdrV }}>0,00%</td>
                  <td style={empR}>0</td>
                  <td style={empR}>0,00%</td>
                </tr>
                <tr>
                  <td style={{ ...tot, borderRight: `1px solid rgba(255,255,255,0.2)` }}>Total</td>
                  <td style={totR}>11 500</td>
                  <td style={{ ...totR, borderRight: `1px solid rgba(255,255,255,0.2)` }}>100,00%</td>
                  <td style={totR}>18 500</td>
                  <td style={totR}>100,00%</td>
                </tr>
                <tr>
                  <td style={{ ...emp, borderRight: bdrV, borderBottom: 'none' }}></td>
                  <td style={{ ...empR, borderBottom: 'none' }}>0</td>
                  <td style={{ ...empR, borderRight: bdrV, borderBottom: 'none' }}>0,00%</td>
                  <td style={{ ...empR, borderBottom: 'none' }}>0</td>
                  <td style={{ ...empR, borderBottom: 'none' }}>0,00%</td>
                </tr>
              </tbody>
            </table>
          </div>

          <button style={{
            background: 'none', border: `1px solid ${T.color.border}`, borderRadius: T.radius,
            padding: '8px 20px', cursor: 'pointer', alignSelf: 'flex-start',
            fontSize: '14px', fontWeight: 500, color: T.color.primaryBlue, fontFamily: T.font,
          }}>
            + Ajouter un associé
          </button>
        </div>
      );
    };

    // ============================================================
    // REUSABLE: Text Input
    // ============================================================
    const FieldInput = ({ label, required, value, onChange, type = 'text', placeholder }) => {
      const [focused, setFocused] = useState(false);
      return (
        <div>
          {label && (
            <label style={{
              display: 'block', fontSize: '14px', fontWeight: 500,
              marginBottom: '6px', color: T.color.textDark,
            }}>
              {required && <span style={{ color: T.color.primaryRed, marginRight: '3px' }}>*</span>}
              {label}
            </label>
          )}
          <input
            type={type}
            placeholder={placeholder || ''}
            value={value || ''}
            onChange={(e) => onChange(e.target.value)}
            onFocus={() => setFocused(true)}
            onBlur={() => setFocused(false)}
            style={{
              width: '100%',
              height: '40px',
              border: `1px solid ${focused ? T.color.primaryBlue : T.color.border}`,
              borderRadius: T.radius,
              padding: '0 14px',
              fontSize: '14px',
              color: T.color.textDark,
              background: T.color.white,
              outline: 'none',
              transition: 'border-color 0.15s',
            }}
          />
        </div>
      );
    };

    // ============================================================
    // REUSABLE: Select
    // ============================================================
    const FieldSelect = ({ label, required, value, onChange, options, placeholder, height = '36px' }) => {
      const [focused, setFocused] = useState(false);
      return (
        <div>
          {label && (
            <label style={{
              display: 'block', fontSize: '14px', fontWeight: 500,
              marginBottom: '6px', color: T.color.textDark,
            }}>
              {required && <span style={{ color: T.color.primaryRed, marginRight: '3px' }}>*</span>}
              {label}
            </label>
          )}
          <div style={{ position: 'relative' }}>
            <select
              value={value || ''}
              onChange={(e) => onChange(e.target.value)}
              onFocus={() => setFocused(true)}
              onBlur={() => setFocused(false)}
              style={{
                width: '100%',
                height: height,
                border: `1px solid ${focused ? T.color.primaryBlue : T.color.border}`,
                borderRadius: T.radius,
                padding: '0 36px 0 14px',
                fontSize: '14px',
                color: value ? T.color.textDark : T.color.gray,
                background: T.color.white,
                appearance: 'none',
                outline: 'none',
                transition: 'border-color 0.15s',
              }}
            >
              {placeholder && <option value="">{placeholder}</option>}
              {options.map((opt, i) => (
                <option key={i} value={opt}>{opt}</option>
              ))}
            </select>
            <div style={{
              position: 'absolute', right: '12px', top: '50%', transform: 'translateY(-50%)',
              pointerEvents: 'none',
            }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.color.gray} strokeWidth="2.5">
                <polyline points="6 9 12 15 18 9" />
              </svg>
            </div>
          </div>
        </div>
      );
    };

    // ============================================================
    // APP
    // ============================================================
    const App = () => {
      const [currentStep, setCurrentStep] = useState(1);
      const [step1, setStep1] = useState({});
      const [step3, setStep3] = useState({});
      const [step4, setStep4] = useState({});
      const [step5, setStep5] = useState({});
      const [stepPCP, setStepPCP] = useState({});

      const updateStep1 = useCallback((path, value) => {
        setStep1(prev => {
          const next = { ...prev };
          const parts = path.split('.');
          if (parts.length === 1) {
            next[parts[0]] = value;
          } else if (parts.length === 2) {
            next[parts[0]] = { ...(next[parts[0]] || {}), [parts[1]]: value };
          }
          return next;
        });
      }, []);

      // Dynamic steps based on checkbox PM in step 4
      const hasPM = !!(step4 && step4.declarePersonneMorale);
      const steps = buildSteps(hasPM);

      // Validation: Step 1 requires profile + qualite + croec
      const isStep1Valid = () => {
        if (!step1.profile || !step1.qualite || !step1.croec) return false;
        if (step1.qualite === 'mandataire') {
          const m = step1.mandataire || {};
          if (!m.nom || !m.prenom || !m.fonction || !m.telephone || !m.email || !m.rue || !m.codePostal || !m.ville || !m.pays) {
            return false;
          }
        }
        return true;
      };

      const goNext = () => {
        window.scrollTo(0, 0);
        setCurrentStep(prev => Math.min(prev + 1, steps.length));
      };
      const goPrev = () => {
        window.scrollTo(0, 0);
        setCurrentStep(prev => Math.max(prev - 1, 1));
      };

      const updateStep3 = useCallback((key, value) => {
        setStep3(prev => ({ ...prev, [key]: value }));
      }, []);

      const updateStep4 = useCallback((key, value) => {
        setStep4(prev => ({ ...prev, [key]: typeof value === 'function' ? value(prev[key]) : value }));
      }, []);

      const updateStep5 = useCallback((key, value) => {
        setStep5(prev => ({ ...prev, [key]: typeof value === 'function' ? value(prev[key]) : value }));
      }, []);

      const updateStepPCP = useCallback((key, value) => {
        setStepPCP(prev => ({ ...prev, [key]: typeof value === 'function' ? value(prev[key]) : value }));
      }, []);

      const renderStep = () => {
        const stepName = steps[currentStep - 1];
        switch (stepName) {
          case "Qualité de la PM & CROEC": return <Step1Content data={step1} update={updateStep1} />;
          case "Dates de sessions": return <Step2Content croec={step1.croec} />;
          case "Caractéristiques de la Société et Renseignements Divers": return <Step3Content data={step3} update={updateStep3} profile={step1.profile} />;
          case "Représentants Légaux": return <Step4Content data={step4} update={updateStep4} />;
          case EXTRA_STEP: return <Step5Content data={step5} update={updateStep5} />;
          case "Personne de contact principal": return <StepPCPContent data={stepPCP} update={updateStepPCP} />;
          case "Liste des associés": return <StepAssociesContent />;
          default: return (
            <div style={{ padding: '40px', textAlign: 'center', color: T.color.gray }}>
              <h2 style={{ fontSize: '24px', fontWeight: 700, color: T.color.textDark, marginBottom: '16px' }}>
                {stepName}
              </h2>
              <p>Étape à venir — construction étape par étape.</p>
            </div>
          );
        }
      };

      const canNext = currentStep === 1 ? isStep1Valid() : true;

      return (
        <div style={{ minHeight: '100vh', background: T.color.bg }}>
          <Navbar />

          {/* Main layout */}
          <div style={{
            display: 'flex',
            paddingTop: '80px',
            paddingBottom: '72px',
            minHeight: '100vh',
          }}>
            {/* Sidebar */}
            <Stepper currentStep={currentStep} steps={steps} />

            {/* Content area */}
            <div style={{
              flex: 1,
              padding: '40px 48px',
              maxWidth: '912px',
            }}>
              {renderStep()}
            </div>
          </div>

          {/* Bottom bar */}
          <BottomBar
            canNext={canNext}
            onNext={goNext}
            onPrev={goPrev}
            onSave={() => alert('Formulaire enregistré pour plus tard.')}
            showPrev={currentStep > 1}
            showSave={currentStep !== 2}
          />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
